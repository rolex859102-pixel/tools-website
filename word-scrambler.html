<!DOCTYPE html>
<html>
<head>
<title>Word Scrambler</title>

<style>

body{
font-family:Arial;
text-align:center;
background:#f4f4f4;
}

.container{
width:70%;
margin:auto;
margin-top:50px;
}

input{
width:80%;
padding:10px;
font-size:16px;
}

button{
padding:10px 20px;
background:#3f51b5;
color:white;
border:none;
margin-top:15px;
cursor:pointer;
}

#result{
margin-top:20px;
background:white;
padding:20px;
font-size:24px;
font-weight:bold;
}

</style>

<link rel="stylesheet" href="css/style.css">
</head>

<body>

<div class="container">

<h1>Word Scrambler</h1>

<input id="wordInput" placeholder="Enter a word">

<br>

<button onclick="scrambleWord()">Scramble</button>

<div id="result"></div>

</div>

<script>

function scrambleWord(){

let word=document.getElementById("wordInput").value;

let letters=word.split("");

for(let i=letters.length-1;i>0;i--){

let j=Math.floor(Math.random()*(i+1));

[letters[i],letters[j]]=[letters[j],letters[i]];

}

document.getElementById("result").innerText=letters.join("");

}

</script>

</body>
</html>
