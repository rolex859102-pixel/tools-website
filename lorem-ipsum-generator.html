<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Lorem Ipsum Generator</title>

<style>

body{
font-family: Arial;
text-align:center;
background:#f4f4f4;
}

.container{
width:70%;
margin:auto;
margin-top:50px;
}

input{
padding:10px;
font-size:16px;
width:120px;
margin-top:10px;
}

button{
padding:10px 20px;
background:#007BFF;
color:white;
border:none;
cursor:pointer;
margin-top:15px;
}

#result{
margin-top:20px;
font-size:18px;
white-space:pre-wrap;
}

</style>
<link rel="stylesheet" href="css/style.css">
</head>

<body>

<div class="container">

<h1>Lorem Ipsum Generator</h1>

<input type="number" id="para" placeholder="Paragraphs">

<br>

<button onclick="generateLorem()">Generate</button>

<div id="result"></div>

</div>

<script>

function generateLorem(){

let count=document.getElementById("para").value;

let text="Lorem ipsum dolor sit amet consectetur adipiscing elit sed do eiusmod tempor incididunt ut labore et dolore magna aliqua.";

let output="";

for(let i=0;i<count;i++){

output+=text+"\n\n";

}

document.getElementById("result").innerText=output;

}

</script>

</body>
</html>
