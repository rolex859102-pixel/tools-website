<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Text to Binary Converter</title>

<style>

body{
font-family: Arial;
text-align:center;
background:#f4f4f4;
}

.container{
width:70%;
margin:auto;
margin-top:50px;
}

textarea{
width:100%;
height:120px;
padding:10px;
font-size:16px;
}

button{
padding:10px 20px;
background:#007BFF;
color:white;
border:none;
margin-top:15px;
cursor:pointer;
}

#result{
margin-top:20px;
font-size:18px;
white-space:pre-wrap;
}

</style>
<link rel="stylesheet" href="css/style.css">
</head>

<body>

<div class="container">

<h1>Text to Binary Converter</h1>

<textarea id="textInput" placeholder="Enter text"></textarea>

<br>

<button onclick="convertText()">Convert</button>

<div id="result"></div>

</div>

<script>

function convertText(){

let text=document.getElementById("textInput").value;

let binary="";

for(let i=0;i<text.length;i++){

binary+=text[i].charCodeAt(0).toString(2)+" ";

}

document.getElementById("result").innerText=binary;

}

</script>

</body>
</html>
