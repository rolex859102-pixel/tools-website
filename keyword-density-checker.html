<!DOCTYPE html>
<html>
<head>
<title>Keyword Density Checker</title>

<style>
body{
font-family:Arial;
text-align:center;
background:#f4f4f4;
}

.container{
width:75%;
margin:auto;
margin-top:40px;
}

textarea{
width:100%;
height:200px;
padding:10px;
font-size:16px;
}

button{
padding:10px 20px;
background:#4CAF50;
color:white;
border:none;
margin-top:10px;
cursor:pointer;
}

#result{
margin-top:20px;
background:white;
padding:15px;
text-align:left;
font-size:18px;
}

</style>
<link rel="stylesheet" href="css/style.css">
</head>

<body>

<div class="container">

<h1>Keyword Density Checker</h1>

<textarea id="textInput" placeholder="Paste your article or text"></textarea>

<br>

<button onclick="checkDensity()">Check Density</button>

<div id="result"></div>

</div>

<script>

function checkDensity(){

let text=document.getElementById("textInput").value.toLowerCase();

let words=text.match(/\b\w+\b/g);

let totalWords=words.length;

let frequency={};

words.forEach(function(word){

frequency[word]=(frequency[word]||0)+1;

});

let result="Total Words: "+totalWords+"<br><br>";

for(let word in frequency){

let count=frequency[word];

let density=((count/totalWords)*100).toFixed(2);

result+=word+" : "+count+" times ("+density+"%)<br>";

}

document.getElementById("result").innerHTML=result;

}

</script>

</body>
</html>
