<!DOCTYPE html>
<html>
<head>
<title>Random Color Generator</title>

<style>

body{
font-family:Arial;
text-align:center;
background:#f4f4f4;
}

.container{
width:70%;
margin:auto;
margin-top:60px;
}

button{
padding:12px 25px;
background:#009688;
color:white;
border:none;
font-size:16px;
cursor:pointer;
}

#colorBox{
margin-top:25px;
height:120px;
background:white;
display:flex;
align-items:center;
justify-content:center;
font-size:22px;
font-weight:bold;
}

</style>

<link rel="stylesheet" href="css/style.css">
</head>

<body>

<div class="container">

<h1>Random Color Generator</h1>

<button onclick="generateColor()">Generate Color</button>

<div id="colorBox">#FFFFFF</div>

</div>

<script>

function generateColor(){

let letters = "0123456789ABCDEF";
let color = "#";

for(let i=0;i<6;i++){
color += letters[Math.floor(Math.random()*16)];
}

document.getElementById("colorBox").style.background=color;
document.getElementById("colorBox").innerText=color;

}

</script>

</body>
</html>
