<!DOCTYPE html>
<html>
<head>
<title>Loan Calculator</title>
<style>
body{background:#020617;color:white;text-align:center;font-family:Arial;}
input{padding:10px;margin:10px;border-radius:8px;border:none;}
button{padding:10px 20px;background:#22c55e;border:none;color:white;border-radius:8px;}
</style>
</head>

<body>

<h1>🏦 Loan Calculator</h1>
<p><strong>100% Free • No Signup • Instant Download</strong></p>
<input type="number" id="amount" placeholder="Loan Amount">
<input type="number" id="rate" placeholder="Interest Rate">
<input type="number" id="years" placeholder="Years">

<br>

<button onclick="calc()">Calculate</button>

<h2 id="out"></h2>

<script>
function calc(){
let p=amount.value;
let r=rate.value/100;
let t=years.value;

let total=p+(p*r*t);

out.innerHTML="Total Payable: ₹"+total;
}
</script>
