<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Loan Calculator</title>

<style>
body {
    background:#020617;
    color:white;
    font-family:Arial;
    text-align:center;
    margin:0;
}

.container {
    max-width:500px;
    margin:auto;
    padding:30px 15px;
}

h1 {
    font-size:28px;
    margin-bottom:10px;
}

p {
    font-size:14px;
}

input {
    width:90%;
    max-width:350px;
    padding:12px;
    margin:10px auto;
    border-radius:10px;
    border:none;
    display:block;
}

button {
    width:90%;
    max-width:350px;
    padding:12px;
    margin-top:10px;
    border:none;
    border-radius:10px;
    background:#22c55e;
    color:white;
    font-size:16px;
    cursor:pointer;
}

#result {
    margin-top:20px;
    font-size:18px;
}

/* FOOTER FIX */
footer {
    margin-top:40px;
    font-size:17px;
}

footer a {
    color: white;
    margin: 0 8px;
    text-decoration: none;
}

footer a:hover {
    color: #60a5fa;
}

/* MOBILE FIX */
@media (max-width:600px) {
    h1 { font-size:24px; }
    .container { padding:25px 10px; }
}
</style>
</head>

<body>

<div class="container">

<h1>🏦 Loan Calculator</h1>

<p><strong>100% Free • Calculate Loan Instantly • Accurate Results</strong></p>

<input type="number" id="amount" placeholder="Loan Amount">
<input type="number" id="rate" placeholder="Interest Rate (%)">
<input type="number" id="years" placeholder="Years">

<button onclick="calculateLoan()">Calculate</button>

<div id="result"></div>

</div>

<footer>
<a href="about.html">About</a> |
<a href="contact.html">Contact</a> |
<a href="privacy-policy.html">Privacy Policy</a> |
<a href="disclaimer.html">Disclaimer</a>
</footer>

<script>
function calculateLoan() {
    let P = document.getElementById("amount").value;
    let r = document.getElementById("rate").value / 100 / 12;
    let n = document.getElementById("years").value * 12;

    if (!P || !r || !n) return alert("Enter all fields");

    let emi = (P * r * Math.pow(1 + r, n)) / (Math.pow(1 + r, n) - 1);

    document.getElementById("result").innerHTML =
        "Monthly EMI: ₹" + Math.round(emi);
}
</script>

</body>
</html>
