<!DOCTYPE html>
<html>
<head>
<title>Robots.txt Generator</title>

<style>

body{
font-family:Arial;
text-align:center;
background:#f4f4f4;
}

.container{
width:70%;
margin:auto;
margin-top:40px;
}

input{
width:100%;
padding:10px;
margin-top:10px;
font-size:16px;
}

button{
padding:10px 20px;
background:#3f51b5;
color:white;
border:none;
margin-top:15px;
cursor:pointer;
}

#result{
margin-top:20px;
background:white;
padding:15px;
text-align:left;
font-family:monospace;
font-size:18px;
white-space:pre-wrap;
}

</style>

<link rel="stylesheet" href="css/style.css">
</head>

<body>

<div class="container">

<h1>Robots.txt Generator</h1>

<input id="disallow" placeholder="Disallow Path (example: /admin/)">

<input id="sitemap" placeholder="Sitemap URL (example: https://example.com/sitemap.xml)">

<br>

<button onclick="generateRobots()">Generate</button>

<div id="result"></div>

</div>

<script>

function generateRobots(){

let disallow=document.getElementById("disallow").value;

let sitemap=document.getElementById("sitemap").value;

let robots=
"User-agent: *\n"+
"Disallow: "+disallow+"\n\n"+
"Sitemap: "+sitemap;

document.getElementById("result").innerText=robots;

}

</script>

</body>
</html>
