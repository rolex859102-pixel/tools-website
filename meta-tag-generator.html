<!DOCTYPE html>
<html>
<head>
<title>Meta Tag Generator</title>

<style>

body{
font-family:Arial;
text-align:center;
background:#f4f4f4;
}

.container{
width:75%;
margin:auto;
margin-top:40px;
}

input, textarea{
width:100%;
padding:10px;
margin-top:10px;
font-size:16px;
}

button{
padding:10px 20px;
background:#009688;
color:white;
border:none;
margin-top:15px;
cursor:pointer;
}

#result{
margin-top:20px;
background:white;
padding:15px;
text-align:left;
font-family:monospace;
font-size:18px;
white-space:pre-wrap;
}

</style>

<link rel="stylesheet" href="css/style.css">
</head>

<body>

<div class="container">

<h1>Meta Tag Generator</h1>

<input id="title" placeholder="Website Title">

<textarea id="description" placeholder="Meta Description"></textarea>

<input id="keywords" placeholder="Keywords (comma separated)">

<br>

<button onclick="generateMeta()">Generate Meta Tags</button>

<div id="result"></div>

</div>

<script>

function generateMeta(){

let title=document.getElementById("title").value;

let description=document.getElementById("description").value;

let keywords=document.getElementById("keywords").value;

let metaTags =
"<title>"+title+"</title>\n"+
'<meta name="description" content="'+description+'">\n'+
'<meta name="keywords" content="'+keywords+'">';

document.getElementById("result").innerText=metaTags;

}

</script>

</body>
</html>
