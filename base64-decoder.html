<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Base64 Decoder</title>

<style>

body{
font-family: Arial;
text-align:center;
background:#f4f4f4;
}

.container{
width:70%;
margin:auto;
margin-top:50px;
}

textarea{
width:100%;
height:120px;
padding:10px;
font-size:16px;
}

button{
padding:10px 20px;
background:#007BFF;
color:white;
border:none;
margin-top:15px;
cursor:pointer;
}

#result{
margin-top:20px;
font-size:18px;
white-space:pre-wrap;
background:white;
padding:10px;
}

</style>
<link rel="stylesheet" href="css/style.css">
</head>

<body>

<div class="container">

<h1>Base64 Decoder</h1>

<textarea id="textInput" placeholder="Enter Base64 text"></textarea>

<br>

<button onclick="decodeBase64()">Decode</button>

<div id="result"></div>

</div>

<script>

function decodeBase64(){

let text=document.getElementById("textInput").value;

try{

let decoded=atob(text);

document.getElementById("result").innerText=decoded;

}

catch{

document.getElementById("result").innerText="Invalid Base64";

}

}

</script>

</body>
</html>
