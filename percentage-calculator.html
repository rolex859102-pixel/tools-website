<!DOCTYPE html>
<html>
<head>
<title>Percentage Calculator</title>

<style>
body{
    background:#020617;
    color:white;
    text-align:center;
    font-family:Arial;
}

input{
    padding:10px;
    margin:10px;
    border-radius:8px;
    border:none;
}

button{
    padding:10px 20px;
    background:#22c55e;
    border:none;
    color:white;
    border-radius:8px;
}
</style>

</head>

<body>

<h1>📊 Percentage Calculator</h1>
<p><strong>100% Free • Calculate Percentage Instantly • Accurate Results</strong></p>
<input type="number" id="num1" placeholder="Enter number">
<input type="number" id="num2" placeholder="Enter percentage">

<br>

<button onclick="calc()">Calculate</button>

<h2 id="result"></h2>

<script>
function calc(){
    let n1 = document.getElementById("num1").value;
    let n2 = document.getElementById("num2").value;

    let res = (n1 * n2) / 100;

    document.getElementById("result").innerHTML = "Result: " + res;
}
</script>
