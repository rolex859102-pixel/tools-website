<!DOCTYPE html>
<html>
<head>
<title>Password Strength Checker</title>

<style>

body{
font-family:Arial;
text-align:center;
background:#f4f4f4;
}

.container{
width:70%;
margin:auto;
margin-top:60px;
}

input{
width:80%;
padding:10px;
font-size:16px;
}

#strength{
margin-top:20px;
font-size:22px;
font-weight:bold;
}

.bar{
width:100%;
height:10px;
background:#ddd;
margin-top:10px;
}

.fill{
height:10px;
width:0%;
}

</style>

<link rel="stylesheet" href="css/style.css">
</head>

<body>

<div class="container">

<h1>Password Strength Checker</h1>

<input type="text" id="password" placeholder="Enter password" onkeyup="checkStrength()">

<div class="bar">
<div id="fill" class="fill"></div>
</div>

<div id="strength"></div>

</div>

<script>

function checkStrength(){

let pass=document.getElementById("password").value;
let strength=0;

if(pass.length>=6) strength++;
if(pass.match(/[A-Z]/)) strength++;
if(pass.match(/[0-9]/)) strength++;
if(pass.match(/[@#$%^&*]/)) strength++;

let fill=document.getElementById("fill");
let text=document.getElementById("strength");

if(strength<=1){
fill.style.width="25%";
fill.style.background="red";
text.innerText="Weak Password";
}

else if(strength==2){
fill.style.width="50%";
fill.style.background="orange";
text.innerText="Medium Password";
}

else{
fill.style.width="100%";
fill.style.background="green";
text.innerText="Strong Password";
}

}

</script>

</body>
</html>
