<!DOCTYPE html>
<html>
<head>
<title>JavaScript Minifier</title>

<style>

body{
font-family:Arial;
text-align:center;
background:#f4f4f4;
}

.container{
width:75%;
margin:auto;
margin-top:40px;
}

textarea{
width:100%;
height:200px;
padding:10px;
font-size:16px;
}

button{
padding:10px 20px;
background:#ff9800;
color:white;
border:none;
margin-top:15px;
cursor:pointer;
}

#result{
margin-top:20px;
background:white;
padding:15px;
text-align:left;
font-family:monospace;
font-size:18px;
white-space:pre-wrap;
}

</style>

<link rel="stylesheet" href="css/style.css">

</head>

<body>

<div class="container">

<h1>JavaScript Minifier</h1>

<textarea id="jsInput" placeholder="Paste JavaScript code"></textarea>

<br>

<button onclick="minifyJS()">Minify JS</button>

<div id="result"></div>

</div>

<script>

function minifyJS(){

let js=document.getElementById("jsInput").value;

let minified = js
.replace(/\n/g,'')
.replace(/\s+/g,' ')
.replace(/\s*{\s*/g,'{')
.replace(/\s*}\s*/g,'}')
.replace(/\s*;\s*/g,';')
.replace(/\s*:\s*/g,':')
.trim();

document.getElementById("result").innerText=minified;

}

</script>

</body>
</html>
