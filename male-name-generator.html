<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Male Name Generator (Unlimited No Repeat)</title>

<style>
body{
background:#020617;
color:white;
font-family:Arial;
text-align:center;
margin:0;
}

.container{
max-width:520px;
margin:auto;
padding:30px 15px;
}

input,select,button{
width:100%;
max-width:360px;
padding:12px;
margin:10px auto;
border-radius:10px;
border:none;
display:block;
}

button{
background:#3b82f6;
color:white;
cursor:pointer;
}

.name-item{
background:#1e293b;
padding:10px;
margin:6px 0;
border-radius:6px;
text-align:left;
cursor:pointer;
}

.name-item:hover{
background:#3b82f6;
}
</style>

</head>

<body>

<div class="container">

<h1>👨 Male Name Generator</h1>
<p><strong>Unlimited • Real Names • No Repeat</strong></p>

<input type="number" id="count" value="50" min="1" max="1000">

<select id="type">
<option value="indian">Indian</option>
<option value="english">English</option>
</select>

<label>
<input type="checkbox" id="unique" checked> No Repeat
</label>

<button onclick="generate()">Generate Names</button>

<div id="result"></div>

</div>

<script>

// 🔥 FIRST NAMES
const indianFirst = ["Aarav","Vivaan","Aditya","Arjun","Kabir","Rohan","Rahul","Krishna","Shivam","Aman","Nikhil","Yash","Aryan","Ravi","Vikas","Raj","Amit","Akash","Karan","Mohit"];
const englishFirst = ["James","John","Michael","David","Robert","Daniel","Matthew","Joseph"];

// 🔥 LAST NAMES
const indianLast = ["Sharma","Verma","Gupta","Yadav","Patel","Singh","Khan","Das","Reddy","Nair"];
const englishLast = ["Smith","Johnson","Brown","Taylor","Anderson","White","Martin"];

function random(arr){
return arr[Math.floor(Math.random()*arr.length)];
}

function generate(){

let count = parseInt(document.getElementById("count").value);
let type = document.getElementById("type").value;
let unique = document.getElementById("unique").checked;

let result = document.getElementById("result");
result.innerHTML = "";

let used = new Set();

for(let i=0;i<count;i++){

let name;

// 🔥 TYPE LOGIC
if(type === "indian"){
name = random(indianFirst) + " " + random(indianLast);
}else{
name = random(englishFirst) + " " + random(englishLast);
}

// 🔥 NO REPEAT
if(unique){
let attempts = 0;
while(used.has(name) && attempts < 50){
name = type === "indian"
? random(indianFirst) + " " + random(indianLast)
: random(englishFirst) + " " + random(englishLast);
attempts++;
}
used.add(name);
}

result.innerHTML += `<div class="name-item" onclick="copyText('${name}')">${i+1}. ${name}</div>`;
}

}

// 🔥 COPY
function copyText(text){
navigator.clipboard.writeText(text);
alert("Copied: " + text);
}

</script>

</body>
</html>
