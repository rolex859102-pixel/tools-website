<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Text Randomizer</title>

<style>

body{
font-family:Arial;
text-align:center;
background:#f4f4f4;
}

.container{
width:70%;
margin:auto;
margin-top:50px;
}

textarea{
width:100%;
height:150px;
padding:10px;
font-size:16px;
}

button{
padding:10px 20px;
margin-top:10px;
background:#ff9800;
color:white;
border:none;
cursor:pointer;
}

#result{
margin-top:20px;
background:white;
padding:10px;
white-space:pre-wrap;
}

</style>
<link rel="stylesheet" href="css/style.css">
</head>

<body>

<div class="container">

<h1>Text Randomizer</h1>

<textarea id="textInput" placeholder="Enter text (one item per line)"></textarea>

<br>

<button onclick="randomizeText()">Randomize</button>

<div id="result"></div>

</div>

<script>

function randomizeText(){

let text=document.getElementById("textInput").value;

let lines=text.split("\n");

for(let i=lines.length-1;i>0;i--){
let j=Math.floor(Math.random()*(i+1));
[lines[i],lines[j]]=[lines[j],lines[i]];
}

document.getElementById("result").innerText=lines.join("\n");

}

</script>

</body>
</html>
