<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Strong Password Generator Online Free | Secure Password Tool</title>
<meta name="description" content="Generate strong secure passwords online free. Customize length, symbols and numbers easily.">

<style>
body {
    background:#0f172a;
    color:white;
    font-family:Arial;
    text-align:center;
}

.container {
    padding:40px 20px;
}

input[type="range"] {
    width:60%;
}

.options {
    margin-top:10px;
}

button {
    padding:12px 20px;
    background:#22c55e;
    color:white;
    border:none;
    border-radius:5px;
    cursor:pointer;
    margin-top:15px;
}

#result {
    margin-top:20px;
    font-size:18px;
    background:#1e293b;
    padding:10px;
    border-radius:8px;
    display:inline-block;
}

.strength {
    margin-top:10px;
}

.affiliate-box {
    margin-top:40px;
    padding:20px;
    background:#1e293b;
    border-radius:10px;
}
</style>
</head>

<body>

<div class="container">

<h1>Password Generator</h1>
<p><strong>Create strong secure passwords instantly.</strong></p>

<label>Password Length: <span id="lengthValue">8</span></label><br>
<input type="range" min="4" max="20" value="8" id="length">

<div class="options">
<label><input type="checkbox" id="uppercase" checked> Uppercase</label>
<label><input type="checkbox" id="lowercase" checked> Lowercase</label>
<label><input type="checkbox" id="numbers" checked> Numbers</label>
<label><input type="checkbox" id="symbols"> Symbols</label>
</div>

<button onclick="generatePassword()">Generate Password</button>

<div id="result">Your password will appear here</div>
<div class="strength" id="strength"></div>

<button onclick="copyPassword()">Copy Password</button>

<!-- Affiliate -->
<div class="affiliate-box">
<h3>Password Manager</h3>
<p>Secure your passwords easily</p>
<a href="YOUR_AFFILIATE_LINK" target="_blank">Try Premium</a>
</div>

<!-- SEO -->
<div style="max-width:800px;margin:40px auto;text-align:left;color:#cbd5f5;">

<h2>Free Password Generator</h2>
<p>Create strong passwords to protect your accounts from hacking.</p>

</div>

</div>

<script>
const lengthSlider = document.getElementById("length");
const lengthValue = document.getElementById("lengthValue");

lengthSlider.oninput = () => {
    lengthValue.textContent = lengthSlider.value;
};

function generatePassword() {
    const length = lengthSlider.value;
    const upper = document.getElementById("uppercase").checked;
    const lower = document.getElementById("lowercase").checked;
    const number = document.getElementById("numbers").checked;
    const symbol = document.getElementById("symbols").checked;

    let chars = "";
    if (upper) chars += "ABCDEFGHIJKLMNOPQRSTUVWXYZ";
    if (lower) chars += "abcdefghijklmnopqrstuvwxyz";
    if (number) chars += "0123456789";
    if (symbol) chars += "!@#$%^&*()_+";

    if (!chars) {
        alert("Select at least one option!");
        return;
    }

    let password = "";
    for (let i = 0; i < length; i++) {
        password += chars[Math.floor(Math.random() * chars.length)];
    }

    document.getElementById("result").innerText = password;

    checkStrength(password);
}

function checkStrength(password) {
    let strength = "Weak";

    if (password.length > 10 && /[A-Z]/.test(password) && /[0-9]/.test(password)) {
        strength = "Medium";
    }
    if (password.length > 14 && /[!@#$%^&*]/.test(password)) {
        strength = "Strong";
    }

    document.getElementById("strength").innerText = "Strength: " + strength;
}

function copyPassword() {
    let text = document.getElementById("result").innerText;
    navigator.clipboard.writeText(text);
    alert("Password copied!");
}
</script>

</body>
</html>
