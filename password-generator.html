<!DOCTYPE html>
<html>
<head>
<title>Password Generator Tool</title>

<style>
body{background:#020617;color:white;text-align:center;}
button{padding:10px;margin:10px;}
</style>

</head>

<body>

<h1>Password Generator Tool</h1>

<button onclick="generate()">Generate Password</button>

<p id="pass" style="color:#00ffcc;"></p>

<!-- 🔥 AFFILIATE -->
<br><br>
<a href="https://1password.com" target="_blank">
<button onclick="trackClick('password')">🔐 Secure with 1Password</button>
</a>

<script>
function generate(){
let chars="abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789@#";
let pass="";
for(let i=0;i<10;i++){
pass+=chars[Math.floor(Math.random()*chars.length)];
}
document.getElementById("pass").innerText=pass;
}

function trackClick(toolName){
let count=localStorage.getItem(toolName)||0;
count++;
localStorage.setItem(toolName,count);
alert("Opening Pro Tool 🚀");
}
</script>

</body>
</html>
