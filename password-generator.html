<!DOCTYPE html>
<html>
<head>
<title>Password Generator Online Free</title>

<style>
body {background:#020617;color:white;text-align:center;font-family:Arial;}
.container {padding:40px;}
input,button {padding:12px;margin:10px;border-radius:10px;border:none;}
button {background:#ff4d4d;color:white;}
</style>
</head>

<body>

<div class="container">
<h1>Password Generator</h1>
<p><strong>Create strong secure passwords instantly.</strong></p>

<input type="number" id="length" placeholder="Password length"><br>
<button onclick="generate()">Generate</button>

<div id="result"></div>
</div>

<script>
function generate(){
let length=document.getElementById("length").value || 10;
let chars="abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789!@#$%";
let pass="";

for(let i=0;i<length;i++){
pass+=chars[Math.floor(Math.random()*chars.length)];
}

document.getElementById("result").innerHTML="<h3>"+pass+"</h3>";
}
</script>

</body>
</html>
