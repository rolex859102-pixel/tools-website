<!DOCTYPE html>
<html>
<head>
<title>Password Generator</title>
<meta name="description" content="Generate strong passwords instantly.">

<style>
body {background:#020617;color:white;text-align:center;font-family:Arial;}
button {padding:10px;background:#22c55e;border:none;}
</style>
</head>

<body>

<h1>Password Generator</h1>

<button onclick="gen()">Generate</button>

<h2 id="pass"></h2>

<script>
function gen(){
let chars = "abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789!@#";
let pass="";
for(let i=0;i<10;i++){
pass += chars[Math.floor(Math.random()*chars.length)];
}
document.getElementById("pass").innerText = pass;
}
</script>

</body>
</html>
