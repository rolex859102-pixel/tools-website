<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Facebook Reels Downloader HD | Download FB Reels 1080p</title>
<meta name="description" content="Download Facebook reels in HD quality (1080p, 720p). Fast and free FB reels downloader.">

<style>
body {
    background:#0f172a;
    color:white;
    font-family:Arial;
    text-align:center;
}

.container {
    padding:40px 20px;
}

input, select {
    padding:12px;
    width:60%;
    border-radius:5px;
    border:none;
    margin:10px;
}

button {
    padding:12px 20px;
    background:#22c55e;
    color:white;
    border:none;
    border-radius:5px;
    cursor:pointer;
}

.progress {
    width:60%;
    height:10px;
    background:#1e293b;
    margin:20px auto;
    border-radius:10px;
    overflow:hidden;
}

.bar {
    height:10px;
    width:0%;
    background:#22c55e;
}

.affiliate-box {
    margin-top:40px;
    padding:20px;
    background:#1e293b;
    border-radius:10px;
}
</style>
</head>

<body>

<div class="container">

<h1>Facebook Reels Downloader</h1>
<p><strong>Download FB reels in HD quality (1080p, 720p).</strong></p>

<input type="text" id="link" placeholder="Paste Facebook Reels URL"><br>

<select id="quality">
<option>1080p (HD)</option>
<option>720p</option>
<option>480p</option>
<option>360p</option>
</select><br>

<button onclick="startDownload()">Download</button>

<div id="status"></div>

<div class="progress">
    <div class="bar" id="bar"></div>
</div>

<div id="downloadBtn"></div>

<!-- Affiliate -->
<div class="affiliate-box">
<h3>Pro Video Downloader</h3>
<p>Download without watermark in full HD</p>
<a href="YOUR_AFFILIATE_LINK" target="_blank">Try Premium</a>
</div>

</div>

<script>
function startDownload() {
    let link = document.getElementById("link").value;

    if (!link) {
        alert("Paste Facebook link!");
        return;
    }

    let quality = document.getElementById("quality").value;
    let status = document.getElementById("status");
    let bar = document.getElementById("bar");

    status.innerHTML = "Fetching video data...";
    bar.style.width = "10%";

    setTimeout(() => {
        status.innerHTML = "Processing video...";
        bar.style.width = "40%";
    }, 1000);

    setTimeout(() => {
        status.innerHTML = "Applying selected quality: " + quality;
        bar.style.width = "70%";
    }, 2000);

    setTimeout(() => {
        status.innerHTML = "Finalizing download...";
        bar.style.width = "100%";
    }, 3000);

    setTimeout(() => {
        status.innerHTML = "⚡ Video ready!";
        document.getElementById("downloadBtn").innerHTML = `
            <button onclick="redirect()">Download ${quality}</button>
        `;
    }, 4000);
}

function redirect() {
    window.open("https://snapsave.app/facebook-reels-download", "_blank");
}
</script>

</body>
</html>
