<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Convert PDF to JPG Online Free</title>
<meta name="description" content="Convert PDF to JPG online free easily. Extract images from PDF quickly.">

<style>
body {
    background:#020617;
    color:white;
    font-family:Arial;
    text-align:center;
    margin:0;
}

.container { padding:40px; }

input, button {
    padding:12px;
    margin:10px;
    border-radius:10px;
    border:none;
}

button {
    background:#ff4d4d;
    color:white;
    cursor:pointer;
}

.tool-btn {
    display:inline-block;
    margin:8px;
    padding:10px 18px;
    background:#1e293b;
    color:white;
    text-decoration:none;
    border-radius:10px;
    font-size:14px;
    transition:0.3s;
}

.tool-btn:hover {
    background:#ff4d4d;
}

#loading {
    display:none;
    margin-top:20px;
    font-size:18px;
    color:#ff4d4d;
}
</style>
</head>

<body>

<div class="container">

<h1>Convert PDF to JPG</h1>
<p><strong>Extract images from PDF or convert pages into JPG.</strong></p>
<p><strong>100% Free • No Signup • Instant Download</strong></p>

<input type="file" id="upload" accept="application/pdf"><br>
<button onclick="convertPDF()">Convert to JPG</button>

<div id="loading">⏳ Processing your file... Please wait</div>

<h3 style="margin-top:40px;">🔥 Related Tools</h3>

<div style="margin-top:20px;">
<a href="jpg-to-pdf.html" class="tool-btn">JPG to PDF</a>
<a href="pdf-to-word.html" class="tool-btn">PDF to Word</a>
<a href="compress-pdf-100kb.html" class="tool-btn">Compress PDF</a>
</div>

</div>

<script>
function convertPDF() {
    let file = document.getElementById("upload").files[0];
    if (!file) return alert("Upload PDF file!");

    document.getElementById("loading").style.display = "block";

    setTimeout(() => {
        // 🔥 Change to your preferred converter
        window.open("https://www.ilovepdf.com/pdf_to_jpg", "_blank");
    }, 2000);
}
</script>
