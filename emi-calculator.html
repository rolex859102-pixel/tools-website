<!DOCTYPE html>
<html>
<head>
<title>EMI Calculator</title>

<style>
body{background:#020617;color:white;text-align:center;font-family:Arial;}
input{padding:10px;margin:10px;border-radius:8px;border:none;}
button{padding:10px 20px;background:#22c55e;border:none;color:white;border-radius:8px;}
.result{margin-top:20px;font-size:20px;}
</style>

</head>

<body>

<h1>💰 EMI Calculator</h1>

<input type="number" id="loan" placeholder="Loan Amount">
<input type="number" id="rate" placeholder="Interest Rate (%)">
<input type="number" id="time" placeholder="Time (Years)">

<br>

<button onclick="calcEMI()">Calculate</button>

<div class="result" id="result"></div>

<script>
function calcEMI(){
let P=document.getElementById("loan").value;
let R=document.getElementById("rate").value/12/100;
let N=document.getElementById("time").value*12;

let EMI=(P*R*Math.pow(1+R,N))/(Math.pow(1+R,N)-1);

document.getElementById("result").innerHTML="Monthly EMI: ₹"+EMI.toFixed(2);
}
</script>

</body>
</html>
