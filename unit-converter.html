<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Unit Converter Online Free | Convert Length, Weight, Temperature</title>
<meta name="description" content="Convert units online free. Length, weight, temperature converter tool. Fast and easy.">

<style>
body {
    background:#0f172a;
    color:white;
    font-family:Arial;
    text-align:center;
}

.container {
    padding:40px 20px;
}

select, input {
    padding:10px;
    margin:10px;
    border-radius:5px;
    border:none;
}

button {
    padding:12px 20px;
    background:#22c55e;
    color:white;
    border:none;
    border-radius:5px;
    cursor:pointer;
}

#result {
    margin-top:20px;
    font-size:18px;
}

.affiliate-box {
    margin-top:40px;
    padding:20px;
    background:#1e293b;
    border-radius:10px;
}
</style>
</head>

<body>

<div class="container">

<h1>Unit Converter</h1>
<p><strong>Convert units online free instantly.</strong></p>

<select id="type">
<option value="length">Length</option>
<option value="weight">Weight</option>
<option value="temperature">Temperature</option>
</select><br>

<input type="number" id="inputValue" placeholder="Enter value">

<select id="from"></select>
<select id="to"></select><br>

<button onclick="convert()">Convert</button>

<div id="result"></div>

<!-- Affiliate -->
<div class="affiliate-box">
<h3>Engineering Tools</h3>
<p>Advanced calculators for professionals</p>
<a href="YOUR_AFFILIATE_LINK" target="_blank">Try Premium</a>
</div>

<!-- SEO -->
<div style="max-width:800px;margin:40px auto;text-align:left;color:#cbd5f5;">
<h2>Free Unit Converter</h2>
<p>Convert length, weight and temperature easily using this tool.</p>
</div>

</div>

<script>
const units = {
    length: ["meter", "kilometer", "mile"],
    weight: ["kg", "gram", "pound"],
    temperature: ["celsius", "fahrenheit"]
};

function updateUnits() {
    let type = document.getElementById("type").value;
    let from = document.getElementById("from");
    let to = document.getElementById("to");

    from.innerHTML = "";
    to.innerHTML = "";

    units[type].forEach(unit => {
        from.innerHTML += `<option>${unit}</option>`;
        to.innerHTML += `<option>${unit}</option>`;
    });
}

document.getElementById("type").addEventListener("change", updateUnits);
window.onload = updateUnits;

function convert() {
    let type = document.getElementById("type").value;
    let val = parseFloat(document.getElementById("inputValue").value);
    let from = document.getElementById("from").value;
    let to = document.getElementById("to").value;

    if (isNaN(val)) {
        alert("Enter value!");
        return;
    }

    let result = val;

    if (type === "length") {
        if (from === "meter" && to === "kilometer") result = val / 1000;
        else if (from === "kilometer" && to === "meter") result = val * 1000;
        else if (from === "meter" && to === "mile") result = val * 0.000621;
        else if (from === "mile" && to === "meter") result = val / 0.000621;
    }

    if (type === "weight") {
        if (from === "kg" && to === "gram") result = val * 1000;
        else if (from === "gram" && to === "kg") result = val / 1000;
        else if (from === "kg" && to === "pound") result = val * 2.20462;
        else if (from === "pound" && to === "kg") result = val / 2.20462;
    }

    if (type === "temperature") {
        if (from === "celsius" && to === "fahrenheit") result = (val * 9/5) + 32;
        else if (from === "fahrenheit" && to === "celsius") result = (val - 32) * 5/9;
    }

    document.getElementById("result").innerText = "Result: " + result;
}
</script>

</body>
</html>
