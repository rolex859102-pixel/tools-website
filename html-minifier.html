<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>HTML Minifier Tool</title>

<style>
body {
    background:#020617;
    color:white;
    font-family:Arial;
    margin:0;
    text-align:center;
}

header {
    padding:20px;
    background:#0f172a;
}

textarea {
    width:80%;
    height:150px;
    padding:15px;
    border-radius:10px;
    border:none;
    margin-top:20px;
}

button {
    margin-top:15px;
    padding:10px 20px;
    border:none;
    border-radius:8px;
    background:#22c55e;
    color:white;
}

.result-box {
    background:#1e293b;
    margin:30px auto;
    padding:20px;
    border-radius:10px;
    width:80%;
    white-space:pre-wrap;
}
</style>

</head>

<body>

<header>
<h1>💻 HTML Minifier</h1>
<p>Minify your HTML code instantly</p>
<p><strong>100% Free • No Signup • Instant Download</strong></p>
</header>

<textarea id="input" placeholder="Paste HTML code..."></textarea><br>

<button onclick="minify()">Minify</button>

<div class="result-box" id="output"></div>

<script>
function minify(){
let code=document.getElementById("input").value;
let minified=code.replace(/\n/g,'').replace(/\s+/g,' ');
document.getElementById("output").innerText=minified;
}
</script>

</footer>
</body>
</html>
