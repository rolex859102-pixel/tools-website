<!DOCTYPE html>
<html>
<head>
<title>Text to Handwriting</title>

<style>

body{
font-family:Arial;
text-align:center;
background:#f4f4f4;
}

.container{
width:80%;
margin:auto;
margin-top:40px;
}

textarea{
width:100%;
height:150px;
padding:10px;
font-size:16px;
}

button{
padding:10px 20px;
margin-top:15px;
background:#4CAF50;
color:white;
border:none;
cursor:pointer;
}

#output{
margin-top:20px;
background:white;
padding:20px;
font-size:24px;
font-family:'Comic Sans MS', cursive;
text-align:left;
white-space:pre-wrap;
line-height:1.6;
}

</style>

<link rel="stylesheet" href="css/style.css">
</head>

<body>

<div class="container">

<h1>Text to Handwriting Converter</h1>

<textarea id="inputText" placeholder="Enter your text"></textarea>

<br>

<button onclick="convertText()">Convert to Handwriting</button>

<div id="output"></div>

</div>

<script>

function convertText(){

let text=document.getElementById("inputText").value;

document.getElementById("output").innerText=text;

}

</script>

</body>
</html>
