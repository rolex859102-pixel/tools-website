<!DOCTYPE html>
<html>
<head>
<title>QR Code Generator</title>

<style>
body{background:#020617;color:white;text-align:center;font-family:Arial;}
input{padding:10px;margin:10px;border-radius:8px;border:none;}
button{padding:10px;background:#22c55e;border:none;color:white;border-radius:8px;}
</style>

</head>

<body>

<h1>📱 QR Code Generator</h1>

<input type="text" id="text" placeholder="Enter text or URL">

<br>

<button onclick="generateQR()">Generate</button>

<br><br>

<img id="qr">

<script>
function generateQR(){
let text=document.getElementById("text").value;
document.getElementById("qr").src="https://api.qrserver.com/v1/create-qr-code/?size=200x200&data="+text;
}
</script>

</body>
</html>
