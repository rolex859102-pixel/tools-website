<!DOCTYPE html>
<html>
<head>
<title>QR Code Generator Online Free</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body {
    background:#020617;
    color:white;
    font-family:Arial;
    text-align:center;
    margin:0;
}

/* 🔥 MAIN FIX */
.container {
    max-width:500px;
    width:100%;
    margin:auto;
    padding:30px 15px;
    box-sizing:border-box;
}

/* 🔥 INPUT + BUTTON FIX */
input, textarea, button {
    width:100%;
    max-width:350px;
    padding:12px;
    margin:10px auto;
    border-radius:10px;
    border:none;
    display:block;
    box-sizing:border-box;
}

button {
    background:#22c55e;
    color:white;
    font-size:16px;
    cursor:pointer;
}

/* 🔥 RESULT */
#result {
    margin-top:20px;
    font-size:18px;
}

/* 🔥 FOOTER */
footer {
    margin-top:40px;
    font-size:17px;
}

footer a {
    color:white;
    margin:0 8px;
    text-decoration:none;
}

footer a:hover {
    color:#60a5fa;
}

/* 🔥 MOBILE PERFECT FIX */
@media (max-width:600px) {
    .container {
        padding:25px 12px;
    }

    h1 {
        font-size:22px;
    }

    input, textarea, button {
        max-width:100%;
        width:100%;
    }
}
</style>
</head>

<body>

<div class="container">
<h1>QR Code Generator</h1>
<p><strong>100% Free • Generate QR Codes Instantly • No Signup Required</strong></p>

<input type="text" id="text" placeholder="Enter text or URL"><br>
<button onclick="generate()">Generate</button>

<div id="output"></div>
</div>

<script>
function generate(){
let text=document.getElementById("text").value;
if(!text) return alert("Enter text!");

let url="https://api.qrserver.com/v1/create-qr-code/?size=200x200&data="+encodeURIComponent(text);

document.getElementById("output").innerHTML=`
<img src="${url}">
<br>
<a href="${url}" download="qr.png">
<button>Download QR</button></a>
`;
}
</script>
<footer style="margin-top:60px; padding:20px 0; font-size:17px; border-top:1px solid #1e293b;">

<a href="about.html" style="color:white; margin:0 12px; text-decoration:none;">About</a> |
<a href="contact.html" style="color:white; margin:0 12px; text-decoration:none;">Contact</a> |
<a href="privacy-policy.html" style="color:white; margin:0 12px; text-decoration:none;">Privacy Policy</a> |
<a href="disclaimer.html" style="color:white; margin:0 12px; text-decoration:none;">Disclaimer</a>

</footer>
</body>
</html>
