<!DOCTYPE html>
<html>
<head>
<title>QR Code Generator Online Free</title>

<style>
body {background:#020617;color:white;text-align:center;font-family:Arial;}
.container {padding:40px;}
input,button {padding:12px;margin:10px;border-radius:10px;border:none;}
button {background:#ff4d4d;color:white;}
img {margin-top:20px;}
</style>
</head>

<body>

<div class="container">
<h1>QR Code Generator</h1>
<p><strong>Create QR codes instantly.</strong></p>

<input type="text" id="text" placeholder="Enter text or URL"><br>
<button onclick="generate()">Generate</button>

<div id="output"></div>
</div>

<script>
function generate(){
let text=document.getElementById("text").value;
if(!text) return alert("Enter text!");

let url="https://api.qrserver.com/v1/create-qr-code/?size=200x200&data="+encodeURIComponent(text);

document.getElementById("output").innerHTML=`
<img src="${url}">
<br>
<a href="${url}" download="qr.png">
<button>Download QR</button></a>
`;
}
</script>

</body>
</html>
