<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Unlimited Random Name Generator</title>

<style>
body{background:#020617;color:white;font-family:Arial;text-align:center;margin:0;}
.container{max-width:500px;margin:auto;padding:30px 15px;}
input,select,button{
width:100%;max-width:350px;padding:12px;margin:10px auto;
border-radius:10px;border:none;display:block;
}
button{background:#22c55e;color:white;cursor:pointer;}
.copy-btn{background:#3b82f6;}
.download-btn{background:#f59e0b;}
.name-item{
background:#1e293b;padding:8px;margin:5px 0;border-radius:6px;text-align:left;
}
</style>
</head>

<body>

<div class="container">

<h1>🎲 Unlimited Name Generator</h1>

<input type="number" id="count" value="50">

<select id="type">
<option value="indian">Indian</option>
<option value="english">English</option>
</select>

<select id="gender">
<option value="all">All</option>
<option value="male">Male</option>
<option value="female">Female</option>
</select>

<label><input type="checkbox" id="unique" checked> No Repeat</label>

<button onclick="generate()">Generate</button>
<button class="copy-btn" onclick="copyNames()">Copy</button>
<button class="download-btn" onclick="downloadNames()">Download</button>

<div id="result"></div>

</div>

<script>

// Base real names (seed)
const base = {
indian: {
male:["Aarav","Vivaan","Aditya","Arjun","Kabir","Rohan","Kunal","Rahul"],
female:["Saanvi","Aanya","Diya","Myra","Ananya","Riya","Kavya","Pooja"]
},
english:{
male:["James","John","Michael","David","Robert","William"],
female:["Mary","Linda","Patricia","Jennifer","Susan","Jessica"]
}
};

// Syllables for infinite generation
const syllables = {
indian:["ra","vi","an","ar","ka","na","ya","shi","ri","ta","ma","ni","sa","ha"],
english:["al","be","ro","mi","da","el","sa","jo","li","na","te","ri","on","ke"]
};

function createName(type){
let parts = syllables[type];
let name = "";
let len = Math.floor(Math.random()*2)+2;

for(let i=0;i<len;i++){
name += parts[Math.floor(Math.random()*parts.length)];
}

// Capitalize
return name.charAt(0).toUpperCase()+name.slice(1);
}

function generate(){
let count = parseInt(document.getElementById("count").value);
let type = document.getElementById("type").value;
let gender = document.getElementById("gender").value;
let unique = document.getElementById("unique").checked;

let pool = [...base[type].male, ...base[type].female];

if(gender==="male") pool = base[type].male;
if(gender==="female") pool = base[type].female;

let result = document.getElementById("result");
result.innerHTML = "";

let used = new Set();

for(let i=0;i<count;i++){
let name;

// Try real names first, then generate new
if(i < pool.length){
name = pool[Math.floor(Math.random()*pool.length)];
}else{
name = createName(type);
}

// Ensure unique
if(unique){
while(used.has(name)){
name = createName(type);
}
used.add(name);
}

result.innerHTML += `<div class="name-item">${i+1}. ${name}</div>`;
}
}

function copyNames(){
let text = document.getElementById("result").innerText;
navigator.clipboard.writeText(text);
alert("Copied!");
}

function downloadNames(){
let text = document.getElementById("result").innerText;
let blob = new Blob([text], {type:"text/plain"});
let link = document.createElement("a");
link.href = URL.createObjectURL(blob);
link.download = "names.txt";
link.click();
}

</script>

</body>
</html>
