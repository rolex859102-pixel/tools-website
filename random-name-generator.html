<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Random Name Generator (Free & Fast)</title>

<style>
body{
    background:#020617;
    color:white;
    font-family:Arial;
    text-align:center;
    margin:0;
}

.container{
    max-width:500px;
    margin:auto;
    padding:30px 15px;
}

h1{
    font-size:26px;
}

input, button{
    width:100%;
    max-width:350px;
    padding:12px;
    margin:10px auto;
    border-radius:10px;
    border:none;
    display:block;
}

button{
    background:#22c55e;
    color:white;
    cursor:pointer;
    font-size:16px;
}

#result{
    margin-top:20px;
    text-align:left;
}

.name-item{
    background:#1e293b;
    padding:8px;
    margin:5px 0;
    border-radius:6px;
}

.copy-btn{
    background:#3b82f6;
}

footer{
    margin-top:40px;
    font-size:17px;
}

footer a{
    color:white;
    margin:0 8px;
    text-decoration:none;
}

</style>
</head>

<body>

<div class="container">

<h1>🎲 Random Name Generator</h1>

<p><strong>100% Free • Generate Unlimited Names • No Signup</strong></p>

<input type="number" id="count" placeholder="How many names?" value="20">

<label>
<input type="checkbox" id="unique" checked> No Repeat Names
</label>

<button onclick="generate()">Generate Names</button>

<button class="copy-btn" onclick="copyNames()">Copy All Names</button>

<div id="result"></div>

</div>

<footer>
<a href="about.html">About</a> |
<a href="contact.html">Contact</a> |
<a href="privacy-policy.html">Privacy Policy</a> |
<a href="disclaimer.html">Disclaimer</a>
</footer>

<script>

const names = [
"Aarav","Vivaan","Aditya","Vihaan","Arjun","Reyansh","Krishna","Ishaan","Kabir","Aryan",
"Saanvi","Aanya","Diya","Myra","Ananya","Sara","Riya","Aadhya","Ira","Kavya",
"Rahul","Amit","Rohit","Priya","Neha","Pooja","Karan","Simran","Raj","Ankit",
"Ravi","Suresh","Vikram","Meena","Sunita","Alok","Deepak","Manoj","Nisha","Pankaj",
"Rakesh","Kunal","Sneha","Divya","Harsh","Nitin","Ayesha","Zoya","Farhan","Imran"
];

function generate(){
let count = parseInt(document.getElementById("count").value);
let unique = document.getElementById("unique").checked;
let result = document.getElementById("result");

result.innerHTML = "";

if(unique){
let shuffled = [...names].sort(() => 0.5 - Math.random());
let selected = shuffled.slice(0, count);

selected.forEach((name, index)=>{
result.innerHTML += `<div class="name-item">${index+1}. ${name}</div>`;
});

}else{
for(let i=0; i<count; i++){
let randomName = names[Math.floor(Math.random()*names.length)];
result.innerHTML += `<div class="name-item">${i+1}. ${randomName}</div>`;
}
}
}

function copyNames(){
let text = document.getElementById("result").innerText;

navigator.clipboard.writeText(text).then(()=>{
alert("Copied!");
});
}

</script>

</body>
</html>
