<!DOCTYPE html>
<html>
<head>
<title>Random Name Generator</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
  
<style>
body {
    background:#020617;
    color:white;
    font-family:Arial;
    text-align:center;
    margin:0;
}

/* 🔥 MAIN FIX */
.container {
    max-width:500px;
    width:100%;
    margin:auto;
    padding:30px 15px;
    box-sizing:border-box;
}

/* 🔥 INPUT + BUTTON FIX */
input, textarea, button {
    width:100%;
    max-width:350px;
    padding:12px;
    margin:10px auto;
    border-radius:10px;
    border:none;
    display:block;
    box-sizing:border-box;
}

button {
    background:#22c55e;
    color:white;
    font-size:16px;
    cursor:pointer;
}

/* 🔥 RESULT */
#result {
    margin-top:20px;
    font-size:18px;
}

/* 🔥 FOOTER */
footer {
    margin-top:40px;
    font-size:17px;
}

footer a {
    color:white;
    margin:0 8px;
    text-decoration:none;
}

footer a:hover {
    color:#60a5fa;
}

/* 🔥 MOBILE PERFECT FIX */
@media (max-width:600px) {
    .container {
        padding:25px 12px;
    }

    h1 {
        font-size:22px;
    }

    input, textarea, button {
        max-width:100%;
        width:100%;
    }
}
</style>
</head>

<body>

<div class="container">
<h1>Random Name Generator</h1>
<p><strong>Generate random names instantly.</strong></p>
<p><strong>100% Free • Generate Random Names Instantly • No Signup Required</strong></p>
<button onclick="generate()">Generate Name</button>

<div id="result"></div>
</div>

<script>
function generate(){
let names=["Rahul","Amit","John","Emma","Sophia","Arjun","Priya"];
let random=names[Math.floor(Math.random()*names.length)];
document.getElementById("result").innerHTML="<h2>"+random+"</h2>";
}
</script>
<footer style="margin-top:60px; padding:20px 0; font-size:17px; border-top:1px solid #1e293b;">

<a href="privacy-policy.html" style="color:white; margin:0 12px; text-decoration:none;">Privacy Policy</a> |
<a href="disclaimer.html" style="color:white; margin:0 12px; text-decoration:none;">Disclaimer</a>

</footer>
</body>
</html>
