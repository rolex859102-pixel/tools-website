<!DOCTYPE html>
<html>
<head>
<title>Random Name Generator</title>

<style>
body {background:#020617;color:white;text-align:center;font-family:Arial;}
.container {padding:40px;}
button {padding:12px;margin:10px;border-radius:10px;border:none;background:#ff4d4d;color:white;}
</style>
</head>

<body>

<div class="container">
<h1>Random Name Generator</h1>
<p><strong>Generate random names instantly.</strong></p>

<button onclick="generate()">Generate Name</button>

<div id="result"></div>
</div>

<script>
function generate(){
let names=["Rahul","Amit","John","Emma","Sophia","Arjun","Priya"];
let random=names[Math.floor(Math.random()*names.length)];
document.getElementById("result").innerHTML="<h2>"+random+"</h2>";
}
</script>
