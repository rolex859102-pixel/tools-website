<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Random Name Generator (Indian & English)</title>

<style>
body{
background:#020617;
color:white;
font-family:Arial;
text-align:center;
margin:0;
}

.container{
max-width:500px;
margin:auto;
padding:30px 15px;
}

input,select,button{
width:100%;
max-width:350px;
padding:12px;
margin:10px auto;
border-radius:10px;
border:none;
display:block;
}

button{
background:#10b981;
color:white;
cursor:pointer;
}

.name-item{
background:#1e293b;
padding:10px;
margin:6px 0;
border-radius:6px;
text-align:left;
cursor:pointer;
}

.name-item:hover{
background:#10b981;
}
</style>
</head>

<body>

<div class="container">

<h1>🎲 Random Name Generator</h1>
<p><strong>Indian • English • Male • Female • 100% Real Names</strong></p>

<input type="number" id="count" value="20" min="1" max="300">

<select id="country">
<option value="all">All (Indian + English)</option>
<option value="indian">Indian</option>
<option value="english">English</option>
</select>

<select id="gender">
<option value="all">All</option>
<option value="male">Male</option>
<option value="female">Female</option>
</select>

<label>
<input type="checkbox" id="unique" checked> No Repeat
</label>

<button onclick="generate()">Generate Names</button>

<div id="result"></div>

</div>

<script>

// 🔥 INDIAN MALE
const indianMale = [
"Aarav","Vivaan","Aditya","Arjun","Kabir","Rohan","Rahul","Krishna","Shivam","Aman",
"Nikhil","Yash","Aryan","Ravi","Vikas","Raj","Amit","Akash","Karan","Mohit"
];

// 🔥 INDIAN FEMALE
const indianFemale = [
"Aaradhya","Ananya","Aditi","Anushka","Pooja","Priya","Riya","Sneha","Simran","Neha",
"Kavita","Shreya","Shivani","Swati","Tanisha","Trisha","Isha","Kajal","Radhika","Sonia"
];

// 🔥 ENGLISH MALE
const englishMale = [
"James","John","Michael","David","Robert","William","Daniel","Matthew","Joseph","Thomas"
];

// 🔥 ENGLISH FEMALE
const englishFemale = [
"Emily","Sophia","Olivia","Emma","Ava","Isabella","Mia","Charlotte","Amelia","Harper"
];

function generate(){

let count = parseInt(document.getElementById("count").value);
let country = document.getElementById("country").value;
let gender = document.getElementById("gender").value;
let unique = document.getElementById("unique").checked;

let pool = [];

// 🔥 BUILD POOL
if(country === "indian" || country === "all"){
if(gender === "male" || gender === "all") pool = pool.concat(indianMale);
if(gender === "female" || gender === "all") pool = pool.concat(indianFemale);
}

if(country === "english" || country === "all"){
if(gender === "male" || gender === "all") pool = pool.concat(englishMale);
if(gender === "female" || gender === "all") pool = pool.concat(englishFemale);
}

let result = document.getElementById("result");
result.innerHTML = "";

// 🔥 LIMIT
if(unique && count > pool.length){
alert("Only " + pool.length + " unique names available");
count = pool.length;
}

let used = new Set();

for(let i=0; i<count; i++){

let name;

if(unique){
do{
name = pool[Math.floor(Math.random()*pool.length)];
} while(used.has(name));
used.add(name);
}else{
name = pool[Math.floor(Math.random()*pool.length)];
}

result.innerHTML += `<div class="name-item" onclick="copyText('${name}')">${i+1}. ${name}</div>`;
}

}

// 🔥 COPY
function copyText(text){
navigator.clipboard.writeText(text);
alert("Copied: " + text);
}

</script>

</body>
</html>
