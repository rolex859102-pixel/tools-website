<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Random Name Generator (Male, Female, Indian, English)</title>

<style>
body{
    background:#020617;
    color:white;
    font-family:Arial;
    text-align:center;
    margin:0;
}

.container{
    max-width:500px;
    margin:auto;
    padding:30px 15px;
}

h1{
    font-size:26px;
}

input, select, button{
    width:100%;
    max-width:350px;
    padding:12px;
    margin:10px auto;
    border-radius:10px;
    border:none;
    display:block;
}

button{
    background:#22c55e;
    color:white;
    cursor:pointer;
}

.copy-btn{
    background:#3b82f6;
}

.download-btn{
    background:#f59e0b;
}

.name-item{
    background:#1e293b;
    padding:8px;
    margin:5px 0;
    border-radius:6px;
    text-align:left;
}

</style>
</head>

<body>

<div class="container">

<h1>🎲 Random Name Generator</h1>

<p><strong>Generate Names by Gender & Country • Free Tool</strong></p>

<input type="number" id="count" value="20">

<select id="type">
<option value="indian">Indian Names</option>
<option value="english">English Names</option>
</select>

<select id="gender">
<option value="all">All</option>
<option value="male">Male</option>
<option value="female">Female</option>
</select>

<label><input type="checkbox" id="unique" checked> No Repeat</label>

<button onclick="generate()">Generate Names</button>
<button class="copy-btn" onclick="copyNames()">Copy</button>
<button class="download-btn" onclick="downloadNames()">Download TXT</button>

<div id="result"></div>

</div>

<script>

const data = {
indian: {
male: ["Aarav","Vivaan","Aditya","Arjun","Kabir","Rohan","Kunal","Rahul","Vikram","Ravi"],
female: ["Saanvi","Aanya","Diya","Myra","Ananya","Riya","Kavya","Pooja","Sneha","Divya"]
},
english: {
male: ["James","John","Robert","Michael","William","David","Richard","Joseph"],
female: ["Mary","Patricia","Jennifer","Linda","Elizabeth","Susan","Jessica","Sarah"]
}
};

function generate(){
let count = parseInt(document.getElementById("count").value);
let type = document.getElementById("type").value;
let gender = document.getElementById("gender").value;
let unique = document.getElementById("unique").checked;

let pool = [];

if(gender==="all"){
pool = [...data[type].male, ...data[type].female];
}else{
pool = data[type][gender];
}

let result = document.getElementById("result");
result.innerHTML="";

if(unique){
let shuffled = [...pool].sort(()=>0.5-Math.random());
let selected = shuffled.slice(0,count);

selected.forEach((name,i)=>{
result.innerHTML += `<div class="name-item">${i+1}. ${name}</div>`;
});
}else{
for(let i=0;i<count;i++){
let name = pool[Math.floor(Math.random()*pool.length)];
result.innerHTML += `<div class="name-item">${i+1}. ${name}</div>`;
}
}
}

function copyNames(){
let text = document.getElementById("result").innerText;
navigator.clipboard.writeText(text);
alert("Copied!");
}

function downloadNames(){
let text = document.getElementById("result").innerText;
let blob = new Blob([text], {type:"text/plain"});
let link = document.createElement("a");
link.href = URL.createObjectURL(blob);
link.download = "names.txt";
link.click();
}

</script>

</body>
</html>
