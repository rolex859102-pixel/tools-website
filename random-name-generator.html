<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Random Name Generator (Indian & English)</title>

<style>
body{
background:#020617;
color:white;
font-family:Arial;
text-align:center;
margin:0;
}

.container{
max-width:520px;
margin:auto;
padding:30px 15px;
}

input,select,button{
width:100%;
max-width:360px;
padding:12px;
margin:10px auto;
border-radius:10px;
border:none;
display:block;
}

button{
background:#10b981;
color:white;
cursor:pointer;
}

.name-item{
background:#1e293b;
padding:10px;
margin:6px 0;
border-radius:6px;
text-align:left;
cursor:pointer;
}

.name-item:hover{
background:#10b981;
}
</style>

</head>

<body>

<div class="container">

<h1>🎲 Random Name Generator</h1>
<p><strong>Indian • English • Male • Female • Unlimited</strong></p>

<input type="number" id="count" value="50" min="1" max="1000">

<select id="gender">
<option value="male">Male</option>
<option value="female">Female</option>
<option value="both">Both</option>
</select>

<select id="type">
<option value="indian">Indian</option>
<option value="english">English</option>
<option value="mixed">Mixed</option>
</select>

<label>
<input type="checkbox" id="unique" checked> No Repeat
</label>

<button onclick="generate()">Generate Names</button>

<div id="result"></div>

</div>

<script>

// 🔥 DATA

const indianMale = ["Aarav","Vivaan","Aditya","Arjun","Kabir","Rohan","Aryan","Krishna","Shivam","Aman","Rahul","Kunal"];
const indianFemale = ["Aaradhya","Ananya","Aditi","Anushka","Pooja","Priya","Riya","Sneha","Simran","Neha","Kavita","Shreya"];

const englishMale = ["James","John","Michael","David","Robert","Daniel","Matthew","Joseph"];
const englishFemale = ["Emily","Sophia","Olivia","Emma","Ava","Isabella","Mia","Charlotte"];

const indianLast = ["Sharma","Verma","Gupta","Yadav","Patel","Singh","Reddy","Nair"];
const englishLast = ["Smith","Johnson","Brown","Taylor","Anderson","White","Martin"];

function random(arr){
return arr[Math.floor(Math.random()*arr.length)];
}

function getFirstName(gender,type){

// 🔥 MALE
if(gender === "male"){
if(type === "english") return random(englishMale);
return random(indianMale);
}

// 🔥 FEMALE
if(gender === "female"){
if(type === "english") return random(englishFemale);
return random(indianFemale);
}

// 🔥 BOTH
if(type === "english"){
return random([...englishMale, ...englishFemale]);
}

if(type === "indian"){
return random([...indianMale, ...indianFemale]);
}

// mixed
return Math.random() > 0.5
? random([...indianMale, ...indianFemale])
: random([...englishMale, ...englishFemale]);

}

function getLastName(type){

if(type === "indian") return random(indianLast);
if(type === "english") return random(englishLast);

// mixed (safe)
return Math.random() > 0.5 ? random(indianLast) : random(englishLast);

}

function generate(){

let count = parseInt(document.getElementById("count").value);
let gender = document.getElementById("gender").value;
let type = document.getElementById("type").value;
let unique = document.getElementById("unique").checked;

let result = document.getElementById("result");
result.innerHTML = "";

let used = new Set();

for(let i=0;i<count;i++){

let first = getFirstName(gender,type);
let last = getLastName(type);
let name = first + " " + last;

// 🔥 NO REPEAT
if(unique){
let attempts = 0;

while(used.has(name) && attempts < 100){

first = getFirstName(gender,type);
last = getLastName(type);
name = first + " " + last;

attempts++;
}

used.add(name);
}

result.innerHTML += `<div class="name-item" onclick="copyText('${name}')">${i+1}. ${name}</div>`;
}

}

// 🔥 COPY
function copyText(text){
navigator.clipboard.writeText(text);
alert("Copied: " + text);
}

</script>

</body>
</html>
