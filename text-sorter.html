<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Text Sorter Tool</title>

<style>

body{
font-family: Arial;
text-align:center;
background:#f4f4f4;
}

.container{
width:70%;
margin:auto;
margin-top:50px;
}

textarea{
width:100%;
height:140px;
padding:10px;
font-size:16px;
}

button{
padding:10px 20px;
background:#007BFF;
color:white;
border:none;
margin-top:15px;
cursor:pointer;
}

#result{
margin-top:20px;
white-space:pre-wrap;
font-size:18px;
}

</style>
<link rel="stylesheet" href="css/style.css">
</head>

<body>

<div class="container">

<h1>Text Sorter</h1>

<textarea id="textInput" placeholder="Enter text (one word per line)"></textarea>

<br>

<button onclick="sortText()">Sort Text</button>

<div id="result"></div>

</div>

<script>

function sortText(){

let text=document.getElementById("textInput").value;

let lines=text.split("\n");

lines.sort();

let output=lines.join("\n");

document.getElementById("result").innerText=output;

}

</script>

</html>
