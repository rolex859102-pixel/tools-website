<!DOCTYPE html>
<html>
<head>
<title>GST Calculator Online</title>
<meta name="description" content="Calculate GST amount easily with this free GST calculator.">

<style>
body {background:#020617;color:white;text-align:center;font-family:Arial;}
input,button {padding:10px;margin:10px;}
button {background:#22c55e;color:white;}
</style>
</head>

<body>

<h1>GST Calculator</h1>

<input type="number" id="amount" placeholder="Amount">
<input type="number" id="gst" placeholder="GST %">

<button onclick="calcGST()">Calculate</button>

<h2 id="result"></h2>

<script>
function calcGST(){
let amt = document.getElementById("amount").value;
let gst = document.getElementById("gst").value;

let total = amt * (1 + gst/100);

document.getElementById("result").innerText = "Total: ₹" + total;
}
</script>

</body>
</html>
