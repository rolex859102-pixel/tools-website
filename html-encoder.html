<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>HTML Encoder</title>

<style>

body{
font-family: Arial;
text-align:center;
background:#f4f4f4;
}

.container{
width:70%;
margin:auto;
margin-top:50px;
}

textarea{
width:100%;
height:120px;
padding:10px;
font-size:16px;
}

button{
padding:10px 20px;
background:#007BFF;
color:white;
border:none;
margin-top:15px;
cursor:pointer;
}

#result{
margin-top:20px;
font-size:18px;
white-space:pre-wrap;
background:white;
padding:10px;
}

</style>
<link rel="stylesheet" href="css/style.css">
</head>

<body>

<div class="container">

<h1>HTML Encoder</h1>

<textarea id="textInput" placeholder="Enter HTML code"></textarea>

<br>

<button onclick="encodeHTML()">Encode HTML</button>

<div id="result"></div>

</div>

<script>

function encodeHTML(){

let text=document.getElementById("textInput").value;

let encoded = text
.replace(/&/g,"&amp;")
.replace(/</g,"&lt;")
.replace(/>/g,"&gt;")
.replace(/"/g,"&quot;")
.replace(/'/g,"&#39;");

document.getElementById("result").innerText=encoded;

}

</script>

</body>
</html>
