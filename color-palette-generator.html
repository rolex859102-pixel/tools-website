<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Unlimited Color Palette Generator</title>

<style>
body{
background:#020617;
color:white;
font-family:Arial;
text-align:center;
margin:0;
}

.container{
padding:20px;
}

button{
padding:12px 20px;
background:#3b82f6;
border:none;
color:white;
border-radius:8px;
cursor:pointer;
margin:10px;
}

.palette{
display:flex;
flex-wrap:wrap;
justify-content:center;
}

.color-box{
width:110px;
height:110px;
margin:8px;
border-radius:10px;
display:flex;
align-items:flex-end;
justify-content:center;
font-size:13px;
padding:8px;
cursor:pointer;
}
</style>
</head>

<body>

<div class="container">

<h1>🎨 Unlimited Color Palette Generator</h1>

<button onclick="generateColors(12)">Generate More Colors</button>

<div id="palette" class="palette"></div>

</div>

<script>

function randomColor(){
let letters = "0123456789ABCDEF";
let color = "#";

for(let i=0;i<6;i++){
color += letters[Math.floor(Math.random()*16)];
}

return color;
}

function generateColors(count){

let palette = document.getElementById("palette");

for(let i=0;i<count;i++){

let color = randomColor();

let div = document.createElement("div");
div.className = "color-box";
div.style.background = color;
div.innerText = color;

div.onclick = function(){
navigator.clipboard.writeText(color);
alert("Copied: " + color);
};

palette.appendChild(div);

}

}

// 🔥 AUTO LOAD ON SCROLL (INFINITE FEEL)
window.addEventListener("scroll", function(){

if(window.innerHeight + window.scrollY >= document.body.offsetHeight - 50){
generateColors(6);
}

});

// 🔥 INITIAL LOAD
generateColors(12);

</script>

</body>
</html>
