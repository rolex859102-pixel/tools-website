<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Unlimited Color Palette Generator</title>

<style>
body{
background:#020617;
color:white;
font-family:Arial;
text-align:center;
margin:0;
}

.container{
padding:20px;
}

button{
padding:10px 15px;
margin:5px;
border:none;
border-radius:8px;
cursor:pointer;
background:#3b82f6;
color:white;
}

/* TOP PALETTE */
.palette{
display:flex;
justify-content:center;
flex-wrap:wrap;
}

.color-box{
width:120px;
height:140px;
margin:10px;
border-radius:10px;
display:flex;
flex-direction:column;
justify-content:flex-end;
align-items:center;
padding:10px;
position:relative;
}

.lock{
position:absolute;
top:5px;
right:5px;
cursor:pointer;
}

/* UNLIMITED GRID */
.grid{
display:flex;
flex-wrap:wrap;
justify-content:center;
margin-top:30px;
}

.grid-box{
width:100px;
height:100px;
margin:6px;
border-radius:8px;
display:flex;
align-items:flex-end;
justify-content:center;
font-size:12px;
padding:5px;
cursor:pointer;
}
</style>
</head>

<body>

<div class="container">

<h1>🎨 Color Palette PRO MAX</h1>

<button onclick="generatePalette()">🔄 Shuffle</button>
<button onclick="copyAll()">📋 Copy All</button>
<button onclick="addMore()">➕ Generate More</button>

<!-- TOP 6 COLORS -->
<div id="palette" class="palette"></div>

<h2>🔥 Unlimited Colors</h2>

<!-- UNLIMITED COLORS -->
<div id="grid" class="grid"></div>

</div>

<script>

let colors = [];
let locked = [];

// 🔥 RANDOM COLOR
function randomColor(){
let letters = "0123456789ABCDEF";
let color = "#";
for(let i=0;i<6;i++){
color += letters[Math.floor(Math.random()*16)];
}
return color;
}

// 🔥 TOP PALETTE (6 COLORS)
function generatePalette(){

let palette = document.getElementById("palette");
palette.innerHTML = "";

for(let i=0;i<6;i++){

if(!colors[i] || !locked[i]){
colors[i] = randomColor();
}

let color = colors[i];

let div = document.createElement("div");
div.className = "color-box";
div.style.background = color;

div.innerHTML = `
<div class="lock" onclick="toggleLock(${i}, event)">
${locked[i] ? "🔒" : "🔓"}
</div>
<div onclick="copyColor('${color}')">${color}</div>
`;

palette.appendChild(div);
}
}

// 🔒 LOCK
function toggleLock(i, e){
e.stopPropagation();
locked[i] = !locked[i];
generatePalette();
}

// 📋 COPY
function copyColor(color){
navigator.clipboard.writeText(color);
alert("Copied: " + color);
}

// 📋 COPY ALL
function copyAll(){
navigator.clipboard.writeText(colors.join(", "));
alert("All copied!");
}

// ➕ ADD MORE COLORS (UNLIMITED)
function addMore(){

let grid = document.getElementById("grid");

for(let i=0;i<12;i++){

let color = randomColor();

let div = document.createElement("div");
div.className = "grid-box";
div.style.background = color;
div.innerText = color;

div.onclick = function(){
copyColor(color);
};

grid.appendChild(div);
}
}

// 🔥 AUTO SCROLL LOAD
window.addEventListener("scroll", function(){

if(window.innerHeight + window.scrollY >= document.body.offsetHeight - 50){
addMore();
}

});

// INIT
generatePalette();
addMore();

</script>

</body>
</html>
