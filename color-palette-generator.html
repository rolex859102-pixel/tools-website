<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Color Palette Generator</title>

<style>
body{
background:#020617;
color:white;
font-family:Arial;
text-align:center;
margin:0;
}

.container{
padding:30px 15px;
}

button{
padding:12px 20px;
background:#3b82f6;
border:none;
color:white;
border-radius:8px;
cursor:pointer;
}

.palette{
display:flex;
flex-wrap:wrap;
justify-content:center;
margin-top:20px;
}

.color-box{
width:120px;
height:120px;
margin:10px;
border-radius:10px;
display:flex;
align-items:flex-end;
justify-content:center;
font-size:14px;
padding:10px;
cursor:pointer;
}
</style>
</head>

<body>

<div class="container">

<h1>🎨 Color Palette Generator</h1>

<button onclick="generate()">Generate Palette</button>

<div id="palette" class="palette"></div>

</div>

<script>

function randomColor(){
let letters = "0123456789ABCDEF";
let color = "#";

for(let i=0;i<6;i++){
color += letters[Math.floor(Math.random()*16)];
}

return color;
}

function generate(){

let palette = document.getElementById("palette");
palette.innerHTML = "";

for(let i=0;i<6;i++){

let color = randomColor();

palette.innerHTML += `
<div class="color-box" style="background:${color}" onclick="copyColor('${color}')">
${color}
</div>
`;

}

}

function copyColor(color){
navigator.clipboard.writeText(color);
alert("Copied: " + color);
}

</script>

</body>
</html>
