<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Color Palette Generator Pro</title>

<style>
body{
background:#020617;
color:white;
font-family:Arial;
text-align:center;
margin:0;
}

.container{
padding:20px;
}

button{
padding:10px 15px;
margin:5px;
border:none;
border-radius:8px;
cursor:pointer;
background:#3b82f6;
color:white;
}

.palette{
display:flex;
flex-wrap:wrap;
justify-content:center;
}

.color-box{
width:120px;
height:140px;
margin:10px;
border-radius:10px;
display:flex;
flex-direction:column;
justify-content:flex-end;
align-items:center;
padding:10px;
font-size:13px;
cursor:pointer;
position:relative;
}

.lock{
position:absolute;
top:5px;
right:5px;
font-size:18px;
cursor:pointer;
}
</style>
</head>

<body>

<div class="container">

<h1>🎨 Color Palette Generator PRO</h1>

<button onclick="generatePalette()">🔄 Shuffle</button>
<button onclick="copyAll()">📋 Copy All</button>
<button onclick="downloadImage()">⬇️ Download</button>

<div id="palette" class="palette"></div>

</div>

<script>

let colors = [];
let locked = [];

function randomColor(){
let letters = "0123456789ABCDEF";
let color = "#";
for(let i=0;i<6;i++){
color += letters[Math.floor(Math.random()*16)];
}
return color;
}

function generatePalette(){

let palette = document.getElementById("palette");
palette.innerHTML = "";

for(let i=0;i<6;i++){

if(!colors[i] || !locked[i]){
colors[i] = randomColor();
}

let color = colors[i];

let div = document.createElement("div");
div.className = "color-box";
div.style.background = color;

div.innerHTML = `
<div class="lock" onclick="toggleLock(${i}, event)">
${locked[i] ? "🔒" : "🔓"}
</div>
<div onclick="copyColor('${color}')">${color}</div>
`;

palette.appendChild(div);
}
}

function toggleLock(index, e){
e.stopPropagation();
locked[index] = !locked[index];
generatePalette();
}

function copyColor(color){
navigator.clipboard.writeText(color);
alert("Copied: " + color);
}

function copyAll(){
let text = colors.join(", ");
navigator.clipboard.writeText(text);
alert("All colors copied!");
}

// 🔥 DOWNLOAD IMAGE
function downloadImage(){

let canvas = document.createElement("canvas");
canvas.width = 600;
canvas.height = 200;

let ctx = canvas.getContext("2d");

for(let i=0;i<colors.length;i++){
ctx.fillStyle = colors[i];
ctx.fillRect(i*100, 0, 100, 200);
}

let link = document.createElement("a");
link.download = "palette.png";
link.href = canvas.toDataURL();
link.click();

}

// INIT
generatePalette();

</script>

</body>
</html>
