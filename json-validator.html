<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>JSON Validator</title>

<style>

body{
font-family: Arial;
text-align:center;
background:#f4f4f4;
}

.container{
width:70%;
margin:auto;
margin-top:50px;
}

textarea{
width:100%;
height:150px;
padding:10px;
font-size:16px;
}

button{
padding:10px 20px;
background:#007BFF;
color:white;
border:none;
margin-top:15px;
cursor:pointer;
}

#result{
margin-top:20px;
font-size:20px;
font-weight:bold;
}

.valid{
color:green;
}

.invalid{
color:red;
}

</style>
<link rel="stylesheet" href="css/style.css">
</head>

<body>

<div class="container">

<h1>JSON Validator</h1>

<textarea id="jsonInput" placeholder="Paste JSON here"></textarea>

<br>

<button onclick="validateJSON()">Validate JSON</button>

<div id="result"></div>

</div>

<script>

function validateJSON(){

let json=document.getElementById("jsonInput").value;

try{

JSON.parse(json);

document.getElementById("result").innerHTML='<span class="valid">Valid JSON ✅</span>';

}

catch{

document.getElementById("result").innerHTML='<span class="invalid">Invalid JSON ❌</span>';

}

}

</script>

</html>
