<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Character Counter Tool</title>

<style>
body {
    background:#020617;
    color:white;
    font-family:Arial;
    margin:0;
    text-align:center;
}

header {
    padding:20px;
    background:#0f172a;
}

textarea {
    width:80%;
    height:150px;
    padding:15px;
    border-radius:10px;
    border:none;
    margin-top:20px;
}

.result-box {
    background:#1e293b;
    margin:30px auto;
    padding:20px;
    border-radius:10px;
    width:60%;
}

.result-box p {
    font-size:18px;
}
</style>

</head>

<body>

<header>
<h1>🔢 Character Counter</h1>
<p>Count characters instantly</p>
<p><strong>100% Free • Instant Character Count • No Signup Required</strong></p>
    
</header>

<textarea id="text" placeholder="Type here..." onkeyup="count()"></textarea>

<div class="result-box">
<p>Total Characters: <span id="total">0</span></p>
<p>Without Spaces: <span id="nospace">0</span></p>
</div>

<script>
function count(){
let text=document.getElementById("text").value;

document.getElementById("total").innerText=text.length;
document.getElementById("nospace").innerText=text.replace(/\s/g,'').length;
}
</script>

</footer>
</body>
</html>
