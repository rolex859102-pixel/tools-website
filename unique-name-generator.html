<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Unique Name Generator (Stylish & Rare Names)</title>

<style>
body{
background:#020617;
color:white;
font-family:Arial;
text-align:center;
margin:0;
}

.container{
max-width:520px;
margin:auto;
padding:30px 15px;
}

input,select,button{
width:100%;
max-width:360px;
padding:12px;
margin:10px auto;
border-radius:10px;
border:none;
display:block;
}

button{
background:#06b6d4;
color:white;
cursor:pointer;
}

.name-item{
background:#1e293b;
padding:10px;
margin:6px 0;
border-radius:6px;
text-align:left;
cursor:pointer;
}

.name-item:hover{
background:#06b6d4;
}
</style>

</head>

<body>

<div class="container">

<h1>✨ Unique Name Generator</h1>
<p><strong>Rare • Stylish • Modern • Unlimited</strong></p>

<input type="number" id="count" value="30" min="1" max="500">

<select id="style">
<option value="modern">Modern</option>
<option value="stylish">Stylish</option>
<option value="brand">Brand Style</option>
</select>

<label>
<input type="checkbox" id="unique" checked> No Repeat
</label>

<button onclick="generate()">Generate Unique Names</button>

<div id="result"></div>

</div>

<script>

// 🔥 NAME PARTS
const start = ["Ka","Ra","Vi","Sa","Ni","Lu","Ze","Ari","Neo","Zy"];
const middle = ["an","ar","en","ix","on","al","ir","os"];
const end = ["ya","it","ex","or","an","esh","io","us","ax"];

const stylishEnd = ["X","Z","99","YT","Pro","King","Live"];
const brandEnd = ["ify","ly","ster","hub","zone","labs","tech"];

function random(arr){
return arr[Math.floor(Math.random()*arr.length)];
}

function generate(){

let count = parseInt(document.getElementById("count").value);
let style = document.getElementById("style").value;
let unique = document.getElementById("unique").checked;

let result = document.getElementById("result");
result.innerHTML = "";

let used = new Set();

for(let i=0;i<count;i++){

let name = random(start) + random(middle) + random(end);

// 🔥 STYLE APPLY
if(style === "stylish"){
name += random(stylishEnd);
}

if(style === "brand"){
name = name.toLowerCase() + random(brandEnd);
}

// 🔥 UNIQUE FIX
if(unique){
let attempts = 0;
while(used.has(name) && attempts < 50){
name = random(start) + random(middle) + random(end);

if(style === "stylish"){
name += random(stylishEnd);
}
if(style === "brand"){
name = name.toLowerCase() + random(brandEnd);
}

attempts++;
}
used.add(name);
}

result.innerHTML += `<div class="name-item" onclick="copyText('${name}')">${i+1}. ${name}</div>`;
}

}

// 🔥 COPY
function copyText(text){
navigator.clipboard.writeText(text);
alert("Copied: " + text);
}

</script>

</body>
</html>
