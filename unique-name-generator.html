<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Unique Name Generator (Cool & Brand Names)</title>

<style>
body{
background:#020617;
color:white;
font-family:Arial;
text-align:center;
margin:0;
}

.container{
max-width:500px;
margin:auto;
padding:30px 15px;
}

input,select,button{
width:100%;
max-width:350px;
padding:12px;
margin:10px auto;
border-radius:10px;
border:none;
display:block;
}

button{
background:#a855f7;
color:white;
cursor:pointer;
}

.name-item{
background:#1e293b;
padding:10px;
margin:6px 0;
border-radius:6px;
text-align:left;
cursor:pointer;
}

.name-item:hover{
background:#a855f7;
}
</style>
</head>

<body>

<div class="container">

<h1>✨ Unique Name Generator</h1>
<p><strong>Cool • Brand • Stylish Names</strong></p>

<input type="text" id="keyword" placeholder="Enter keyword (optional)">

<input type="number" id="count" value="20" min="1" max="200">

<select id="type">
<option value="brand">Brand Names</option>
<option value="cool">Cool Names</option>
<option value="modern">Modern Names</option>
<option value="short">Short Names</option>
</select>

<label>
<input type="checkbox" id="unique" checked> No Repeat
</label>

<button onclick="generate()">Generate Names</button>

<div id="result"></div>

</div>

<script>

// 🔥 WORD BANK
const start = ["neo","zen","pro","ultra","meta","next","smart","quick","hyper","prime"];
const middle = ["tech","zone","hub","lab","world","space","link","craft","core","byte"];
const end = ["x","ify","ly","ster","io","hub","pro","max","plus","go"];

function random(arr){
return arr[Math.floor(Math.random()*arr.length)];
}

function generate(){

let keyword = document.getElementById("keyword").value.trim().toLowerCase();
let count = parseInt(document.getElementById("count").value);
let type = document.getElementById("type").value;
let unique = document.getElementById("unique").checked;

let result = document.getElementById("result");
result.innerHTML = "";

let used = new Set();

for(let i=0;i<count;i++){

let name;

// 🔥 NAME LOGIC
if(type === "short"){
name = random(start) + Math.floor(Math.random()*99);
}else{
name = random(start) + (keyword || random(middle)) + random(end);
}

// clean
name = name.replace(/\s+/g,"");

if(unique){
while(used.has(name)){
name = random(start) + random(middle) + random(end);
}
used.add(name);
}

result.innerHTML += `<div class="name-item" onclick="copyText('${name}')">${i+1}. ${name}</div>`;
}

}

// 🔥 COPY FUNCTION
function copyText(text){
navigator.clipboard.writeText(text);
alert("Copied: " + text);
}

</script>

</body>
</html>
