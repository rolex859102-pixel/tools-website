<!DOCTYPE html>
<html>
<head>
<title>Gradient Generator</title>

<style>

body{
font-family:Arial;
text-align:center;
background:#f4f4f4;
}

.container{
width:60%;
margin:auto;
margin-top:50px;
}

input[type="color"]{
width:80px;
height:40px;
border:none;
cursor:pointer;
margin:10px;
}

#gradientBox{
width:100%;
height:200px;
margin-top:20px;
border-radius:10px;
}

button{
padding:10px 20px;
margin-top:15px;
background:#673ab7;
color:white;
border:none;
cursor:pointer;
}

#output{
margin-top:20px;
background:white;
padding:15px;
font-size:16px;
word-break:break-all;
}

</style>

<link rel="stylesheet" href="css/style.css">
</head>

<body>

<div class="container">

<h1>Gradient Generator</h1>

<input type="color" id="color1" value="#ff0000">
<input type="color" id="color2" value="#0000ff">

<br>

<button onclick="generateGradient()">Generate Gradient</button>

<div id="gradientBox"></div>

<div id="output"></div>

</div>

<script>

function generateGradient(){

let c1=document.getElementById("color1").value;
let c2=document.getElementById("color2").value;

// Gradient CSS
let gradient="linear-gradient(to right, "+c1+", "+c2+")";

// Apply
document.getElementById("gradientBox").style.background=gradient;

// Show CSS
document.getElementById("output").innerText=
"background: "+gradient+";";

}

</script>

</body>
</html>
