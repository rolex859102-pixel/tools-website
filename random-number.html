<!DOCTYPE html>
<html>
<head>
<title>Random Number Generator</title>

<style>
body{background:#020617;color:white;text-align:center;font-family:Arial;}
input{padding:10px;margin:10px;border-radius:8px;border:none;}
button{padding:10px;background:#22c55e;border:none;color:white;border-radius:8px;}
</style>

</head>

<body>

<h1>🎲 Random Number Generator</h1>

<input type="number" id="min" placeholder="Min">
<input type="number" id="max" placeholder="Max">

<br>

<button onclick="gen()">Generate</button>

<h2 id="result"></h2>

<script>
function gen(){
let min=parseInt(document.getElementById("min").value);
let max=parseInt(document.getElementById("max").value);

let num=Math.floor(Math.random()*(max-min+1))+min;

document.getElementById("result").innerHTML=num;
}
</script>

</body>
</html>
