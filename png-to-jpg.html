<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Convert PNG to JPG Online Free (High Quality)</title>
<meta name="description" content="Convert PNG to JPG online free without losing quality. Fast and easy image converter tool.">

<style>
body {
    background:#020617;
    color:white;
    font-family:Arial;
    text-align:center;
    margin:0;
}

.container { padding:40px; }

input, button {
    padding:12px;
    margin:10px;
    border-radius:10px;
    border:none;
}

button {
    background:#ff4d4d;
    color:white;
    cursor:pointer;
}

img { max-width:250px; margin-top:20px; }

.tool-btn {
    display:inline-block;
    margin:8px;
    padding:10px 18px;
    background:#1e293b;
    color:white;
    text-decoration:none;
    border-radius:10px;
    font-size:14px;
    transition:0.3s;
}

.tool-btn:hover {
    background:#ff4d4d;
}
</style>
</head>

<body>

<div class="container">

<h1>Convert PNG to JPG</h1>
<p><strong>Convert PNG images to JPG instantly without losing quality.</strong></p>

<input type="file" id="upload" accept="image/png"><br>
<button onclick="convert()">Convert</button>

<div id="result"></div>

<h3 style="margin-top:40px;">🔥 Related Tools</h3>

<div style="margin-top:20px;">
<a href="jpg-to-png.html" class="tool-btn">JPG to PNG Converter</a>
<a href="compress-image-50kb.html" class="tool-btn">Compress Image 50KB</a>
<a href="resize-image-100kb.html" class="tool-btn">Resize Image 100KB</a>
</div>

</div>

<script>
function convert() {
    let file = document.getElementById("upload").files[0];
    if (!file) return alert("Upload PNG image!");

    let reader = new FileReader();
    reader.onload = function(e) {
        let img = new Image();
        img.src = e.target.result;

        img.onload = function() {
            let canvas = document.createElement("canvas");
            let ctx = canvas.getContext("2d");

            canvas.width = img.width;
            canvas.height = img.height;

            // White background for JPG
            ctx.fillStyle = "#ffffff";
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.drawImage(img, 0, 0);

            let data = canvas.toDataURL("image/jpeg", 0.9);

            document.getElementById("result").innerHTML = `
                <img src="${data}">
                <br>
                <a href="${data}" download="converted.jpg">
                <button>Download JPG</button></a>
            `;
        };
    };
    reader.readAsDataURL(file);
}
</script>

</body>
</html>
