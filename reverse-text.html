<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Reverse Text Generator</title>

<style>

body{
font-family: Arial;
text-align:center;
background:#f4f4f4;
}

.container{
width:70%;
margin:auto;
margin-top:50px;
}

textarea{
width:100%;
height:120px;
padding:10px;
font-size:16px;
}

button{
padding:10px 20px;
background:#007BFF;
color:white;
border:none;
margin-top:15px;
cursor:pointer;
}

#result{
margin-top:20px;
font-size:18px;
white-space:pre-wrap;
}

</style>
<link rel="stylesheet" href="css/style.css">
</head>

<body>

<div class="container">

<h1>Reverse Text Generator</h1>

<textarea id="textInput" placeholder="Enter text here"></textarea>

<br>

<button onclick="reverseText()">Reverse Text</button>

<div id="result"></div>

</div>

<script>

function reverseText(){

let text=document.getElementById("textInput").value;

let reversed=text.split("").reverse().join("");

document.getElementById("result").innerText=reversed;

}

</script>

</body>
</html>
