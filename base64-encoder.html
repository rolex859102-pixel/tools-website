<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Base64 Encoder</title>

<style>

body{
font-family: Arial;
text-align:center;
background:#f4f4f4;
}

.container{
width:70%;
margin:auto;
margin-top:50px;
}

textarea{
width:100%;
height:120px;
padding:10px;
font-size:16px;
}

button{
padding:10px 20px;
background:#ff5722;
color:white;
border:none;
margin-top:15px;
cursor:pointer;
}

#result{
margin-top:20px;
font-size:18px;
background:white;
padding:10px;
white-space:pre-wrap;
}

</style>
<link rel="stylesheet" href="css/style.css">
</head>

<body>

<div class="container">

<h1>Base64 Encoder</h1>

<textarea id="textInput" placeholder="Enter text"></textarea>

<br>

<button onclick="encodeBase64()">Encode</button>

<div id="result"></div>

</div>

<script>

function encodeBase64(){

let text = document.getElementById("textInput").value;

let encoded = btoa(text);

document.getElementById("result").innerText = encoded;

}

</script>

</body>
</html>
