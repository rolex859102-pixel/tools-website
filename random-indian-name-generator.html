<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Unlimited Real Name Generator (Pro)</title>

<style>
body{
background:#020617;
color:white;
font-family:Arial;
text-align:center;
margin:0;
}

.container{
max-width:520px;
margin:auto;
padding:30px 15px;
}

input,select,button{
width:100%;
max-width:360px;
padding:12px;
margin:10px auto;
border-radius:10px;
border:none;
display:block;
}

button{
background:#22c55e;
color:white;
cursor:pointer;
}

.name-item{
background:#1e293b;
padding:10px;
margin:6px 0;
border-radius:6px;
text-align:left;
cursor:pointer;
}

.name-item:hover{
background:#22c55e;
}
</style>
</head>

<body>

<div class="container">

<h1>🚀 Unlimited Real Name Generator</h1>
<p><strong>Indian • English • Full Name • No Repeat</strong></p>

<input type="number" id="count" value="50" min="1" max="1000">

<select id="style">
<option value="indian">Indian</option>
<option value="english">English</option>
<option value="mix">Mixed</option>
</select>

<label>
<input type="checkbox" id="unique" checked> No Repeat
</label>

<button onclick="generate()">Generate Names</button>

<div id="result"></div>

</div>

<script>

// 🔥 FIRST NAMES
const indianFirst = ["Aarav","Vivaan","Aditya","Arjun","Kabir","Rohan","Rahul","Krishna","Shivam","Aman","Nikhil","Yash","Aryan","Ravi","Vikas","Raj","Amit","Akash","Karan","Mohit"];
const englishFirst = ["James","John","Michael","David","Robert","Daniel","Matthew","Joseph","Thomas","William"];

// 🔥 MIDDLE NAMES
const middle = ["Kumar","Raj","Dev","Singh","Prasad","Ali","Khan","Das","Paul","James"];

// 🔥 LAST NAMES
const indianLast = ["Sharma","Verma","Gupta","Yadav","Singh","Patel","Khan","Das","Reddy","Nair"];
const englishLast = ["Smith","Johnson","Brown","Taylor","Anderson","Thomas","Jackson","White","Harris","Martin"];

function random(arr){
return arr[Math.floor(Math.random()*arr.length)];
}

function generate(){

let count = parseInt(document.getElementById("count").value);
let style = document.getElementById("style").value;
let unique = document.getElementById("unique").checked;

let result = document.getElementById("result");
result.innerHTML = "";

let used = new Set();

for(let i=0;i<count;i++){

let first, last, mid;

// 🔥 STYLE LOGIC
if(style === "indian"){
first = random(indianFirst);
last = random(indianLast);
}else if(style === "english"){
first = random(englishFirst);
last = random(englishLast);
}else{
first = Math.random() > 0.5 ? random(indianFirst) : random(englishFirst);
last = Math.random() > 0.5 ? random(indianLast) : random(englishLast);
}

// optional middle
mid = Math.random() > 0.5 ? random(middle) : "";

let fullName = mid ? `${first} ${mid} ${last}` : `${first} ${last}`;

// 🔥 UNIQUE CHECK
if(unique){
let attempts = 0;
while(used.has(fullName) && attempts < 50){
first = random(indianFirst);
last = random(indianLast);
mid = Math.random() > 0.5 ? random(middle) : "";
fullName = mid ? `${first} ${mid} ${last}` : `${first} ${last}`;
attempts++;
}
used.add(fullName);
}

result.innerHTML += `<div class="name-item" onclick="copyText('${fullName}')">${i+1}. ${fullName}</div>`;
}

}

// 🔥 COPY FUNCTION
function copyText(text){
navigator.clipboard.writeText(text);
alert("Copied: " + text);
}

</script>

</body>
</html>
