<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Real Name Generator (Indian & English)</title>

<style>
body{
background:#020617;
color:white;
font-family:Arial;
text-align:center;
margin:0;
}

.container{
max-width:520px;
margin:auto;
padding:30px 15px;
}

input,select,button{
width:100%;
max-width:360px;
padding:12px;
margin:10px auto;
border-radius:10px;
border:none;
display:block;
}

button{
background:#22c55e;
color:white;
cursor:pointer;
}

.name-item{
background:#1e293b;
padding:10px;
margin:6px 0;
border-radius:6px;
text-align:left;
cursor:pointer;
}

.name-item:hover{
background:#22c55e;
}
</style>
</head>

<body>

<div class="container">

<h1>🚀 Real Name Generator</h1>
<p><strong>Indian • English • Mixed • 100% Realistic</strong></p>

<input type="number" id="count" value="30" min="1" max="1000">

<select id="style">
<option value="indian">Indian</option>
<option value="english">English</option>
<option value="mixed">Mixed</option>
</select>

<label>
<input type="checkbox" id="unique" checked> No Repeat
</label>

<button onclick="generate()">Generate Names</button>

<div id="result"></div>

</div>

<script>

// 🔥 INDIAN CATEGORIES

const hinduFirst = ["Aarav","Vivaan","Aryan","Rohan","Aditya","Arjun","Kunal","Rahul"];
const hinduLast = ["Sharma","Verma","Gupta","Yadav","Patel","Mishra"];

const muslimFirst = ["Ayaan","Imran","Faizan","Rehan","Zaid","Armaan"];
const muslimMiddle = ["Ali","Ahmed"];
const muslimLast = ["Khan","Sheikh"];

const southFirst = ["Arjun","Karthik","Ravi","Vijay","Surya"];
const southLast = ["Reddy","Nair","Iyer"];

// 🔥 ENGLISH
const englishFirst = ["James","John","Michael","David","Robert","Daniel","Matthew"];
const englishLast = ["Smith","Johnson","Brown","Taylor","Anderson","White"];

function random(arr){
return arr[Math.floor(Math.random()*arr.length)];
}

// 🔥 INDIAN NAME
function generateIndian(){

let type = Math.random();
let name;

// Hindu
if(type < 0.5){
let first = random(hinduFirst);
let last = random(hinduLast);
let mid = Math.random() > 0.5 ? random(["Kumar","Raj"]) : "";
name = mid ? `${first} ${mid} ${last}` : `${first} ${last}`;
}

// Muslim
else if(type < 0.8){
let first = random(muslimFirst);
let mid = random(muslimMiddle);
let last = random(muslimLast);
name = `${first} ${mid} ${last}`;
}

// South
else{
let first = random(southFirst);
let last = random(southLast);
name = `${first} ${last}`;
}

return name;
}

// 🔥 ENGLISH NAME
function generateEnglish(){
return random(englishFirst) + " " + random(englishLast);
}

function generate(){

let count = parseInt(document.getElementById("count").value);
let style = document.getElementById("style").value;
let unique = document.getElementById("unique").checked;

let result = document.getElementById("result");
result.innerHTML = "";

let used = new Set();

for(let i=0;i<count;i++){

let name;

// 🔥 STYLE FIX
if(style === "indian"){
name = generateIndian();
}
else if(style === "english"){
name = generateEnglish();
}
else{
// MIXED (NO WRONG MIX)
name = Math.random() > 0.5 ? generateIndian() : generateEnglish();
}

// 🔥 UNIQUE FIX
if(unique){
let attempts = 0;
while(used.has(name) && attempts < 50){
name = style === "indian" ? generateIndian() :
       style === "english" ? generateEnglish() :
       (Math.random() > 0.5 ? generateIndian() : generateEnglish());
attempts++;
}
used.add(name);
}

result.innerHTML += `<div class="name-item" onclick="copyText('${name}')">${i+1}. ${name}</div>`;
}

}

// 🔥 COPY
function copyText(text){
navigator.clipboard.writeText(text);
alert("Copied: " + text);
}

</script>

</body>
</html>
