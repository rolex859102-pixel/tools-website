<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>HTML Decoder</title>

<style>

body{
font-family: Arial;
text-align:center;
background:#f4f4f4;
}

.container{
width:70%;
margin:auto;
margin-top:50px;
}

textarea{
width:100%;
height:120px;
padding:10px;
font-size:16px;
}

button{
padding:10px 20px;
background:#28a745;
color:white;
border:none;
margin-top:15px;
cursor:pointer;
}

#result{
margin-top:20px;
font-size:18px;
white-space:pre-wrap;
background:white;
padding:10px;
}

</style>
<link rel="stylesheet" href="css/style.css">
</head>

<body>

<div class="container">

<h1>HTML Decoder</h1>

<textarea id="textInput" placeholder="Enter encoded HTML"></textarea>

<br>

<button onclick="decodeHTML()">Decode HTML</button>

<div id="result"></div>

</div>

<script>

function decodeHTML(){

let text=document.getElementById("textInput").value;

let decoded = text
.replace(/&lt;/g,"<")
.replace(/&gt;/g,">")
.replace(/&quot;/g,'"')
.replace(/&#39;/g,"'")
.replace(/&amp;/g,"&");

document.getElementById("result").innerText = decoded;

}

</script>

</body>
</html>
