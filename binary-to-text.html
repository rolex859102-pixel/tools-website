<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Binary to Text Converter</title>

<style>

body{
font-family: Arial;
text-align:center;
background:#f4f4f4;
}

.container{
width:70%;
margin:auto;
margin-top:50px;
}

textarea{
width:100%;
height:120px;
padding:10px;
font-size:16px;
}

button{
padding:10px 20px;
background:#007BFF;
color:white;
border:none;
margin-top:15px;
cursor:pointer;
}

#result{
margin-top:20px;
font-size:20px;
white-space:pre-wrap;
}

</style>
<link rel="stylesheet" href="css/style.css">
</head>

<body>

<div class="container">

<h1>Binary to Text Converter</h1>

<textarea id="binaryInput" placeholder="Enter binary code"></textarea>

<br>

<button onclick="convertBinary()">Convert</button>

<div id="result"></div>

</div>

<script>

function convertBinary(){

let binary=document.getElementById("binaryInput").value;

let binaryArray=binary.split(" ");

let text="";

for(let i=0;i<binaryArray.length;i++){

text+=String.fromCharCode(parseInt(binaryArray[i],2));

}

document.getElementById("result").innerText=text;

}

</script>

</body>
</html>
