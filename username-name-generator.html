<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Username Generator (Stylish & Unique)</title>

<style>
body{
background:#020617;
color:white;
font-family:Arial;
text-align:center;
margin:0;
}

.container{
max-width:520px;
margin:auto;
padding:30px 15px;
}

input,select,button{
width:100%;
max-width:360px;
padding:12px;
margin:10px auto;
border-radius:10px;
border:none;
display:block;
}

button{
background:#8b5cf6;
color:white;
cursor:pointer;
}

.name-item{
background:#1e293b;
padding:10px;
margin:6px 0;
border-radius:6px;
text-align:left;
cursor:pointer;
}

.name-item:hover{
background:#8b5cf6;
}
</style>

</head>

<body>

<div class="container">

<h1>🔥 Username Generator</h1>
<p><strong>Stylish • Unique • Instagram • Gaming</strong></p>

<input type="text" id="name" placeholder="Enter your name (optional)">

<input type="number" id="count" value="30" min="1" max="200">

<select id="style">
<option value="simple">Simple</option>
<option value="stylish">Stylish</option>
<option value="gaming">Gaming</option>
</select>

<label>
<input type="checkbox" id="unique" checked> No Repeat
</label>

<button onclick="generate()">Generate Usernames</button>

<div id="result"></div>

</div>

<script>

const prefixes = ["real","its","the","official","mr","iam","legend","dark","pro"];
const suffixes = ["yt","official","gaming","live","x","zone","007","king","boss"];

const gamingWords = ["killer","sniper","shadow","ghost","dragon","hunter","warrior","beast"];

function random(arr){
return arr[Math.floor(Math.random()*arr.length)];
}

function generate(){

let name = document.getElementById("name").value.trim().toLowerCase();
let count = parseInt(document.getElementById("count").value);
let style = document.getElementById("style").value;
let unique = document.getElementById("unique").checked;

let result = document.getElementById("result");
result.innerHTML = "";

let used = new Set();

for(let i=0;i<count;i++){

let username;

// 🔥 BASE NAME
let base = name ? name : random(["user","cool","star","hero","player"]);

// 🔥 STYLE LOGIC
if(style === "simple"){
username = base + random(suffixes);
}

else if(style === "stylish"){
username = random(prefixes) + "_" + base + "_" + random(suffixes);
}

else{
// gaming
username = base + "_" + random(gamingWords) + random(["x","99","007"]);
}

// 🔥 UNIQUE FIX
if(unique){
let attempts = 0;
while(used.has(username) && attempts < 50){

base = name ? name : random(["user","cool","star","hero","player"]);

if(style === "simple"){
username = base + random(suffixes);
}
else if(style === "stylish"){
username = random(prefixes) + "_" + base + "_" + random(suffixes);
}
else{
username = base + "_" + random(gamingWords) + random(["x","99","007"]);
}

attempts++;
}
used.add(username);
}

result.innerHTML += `<div class="name-item" onclick="copyText('${username}')">${i+1}. ${username}</div>`;
}

}

// 🔥 COPY
function copyText(text){
navigator.clipboard.writeText(text);
alert("Copied: " + text);
}

</script>

</body>
</html>
