<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Username Generator (Stylish & Random)</title>

<style>
body{
background:#020617;
color:white;
font-family:Arial;
text-align:center;
margin:0;
}

.container{
max-width:500px;
margin:auto;
padding:30px 15px;
}

input,select,button{
width:100%;
max-width:350px;
padding:12px;
margin:10px auto;
border-radius:10px;
border:none;
display:block;
}

button{
background:#3b82f6;
color:white;
cursor:pointer;
}

.name-item{
background:#1e293b;
padding:10px;
margin:6px 0;
border-radius:6px;
text-align:left;
cursor:pointer;
}

.name-item:hover{
background:#3b82f6;
}
</style>
</head>

<body>

<div class="container">

<h1>🔥 Username Generator</h1>
<p><strong>Stylish • Cool • Unlimited Usernames</strong></p>

<input type="text" id="keyword" placeholder="Enter keyword (optional)">

<input type="number" id="count" value="20" min="1" max="200">

<select id="style">
<option value="cool">Cool</option>
<option value="gaming">Gaming</option>
<option value="instagram">Instagram</option>
<option value="short">Short</option>
</select>

<button onclick="generate()">Generate Usernames</button>

<div id="result"></div>

</div>

<script>

const words1 = ["king","pro","dark","real","mr","official","crazy","legend","silent","cool"];
const words2 = ["gamer","boy","yt","live","zone","world","x","hub","army","vibes"];

function randomWord(arr){
return arr[Math.floor(Math.random()*arr.length)];
}

function generate(){

let keyword = document.getElementById("keyword").value.trim();
let count = parseInt(document.getElementById("count").value);
let style = document.getElementById("style").value;

let result = document.getElementById("result");
result.innerHTML = "";

for(let i=0;i<count;i++){

let name = "";

// 🔥 username logic
if(style === "short"){
name = randomWord(words1) + Math.floor(Math.random()*99);
}else{
name = randomWord(words1) + (keyword || randomWord(words2)) + Math.floor(Math.random()*999);
}

// clean
name = name.replace(/\s+/g, "").toLowerCase();

result.innerHTML += `<div class="name-item" onclick="copyText('${name}')">${i+1}. ${name}</div>`;
}

}

// 🔥 click to copy
function copyText(text){
navigator.clipboard.writeText(text);
alert("Copied: " + text);
}

</script>

</body>
</html>
