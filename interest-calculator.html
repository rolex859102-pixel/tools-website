<!DOCTYPE html>
<html>
<head>
<title>Interest Calculator</title>
<style>
body{background:#020617;color:white;text-align:center;font-family:Arial;}
input{padding:10px;margin:10px;border-radius:8px;border:none;}
button{padding:10px 20px;background:#22c55e;border:none;color:white;border-radius:8px;}
</style>
</head>

<body>

<h1>💰 Interest Calculator</h1>

<input type="number" id="p" placeholder="Principal">
<input type="number" id="r" placeholder="Rate (%)">
<input type="number" id="t" placeholder="Time">

<br>

<button onclick="calc()">Calculate</button>

<h2 id="res"></h2>

<script>
function calc(){
let si=(p.value*r.value*t.value)/100;
res.innerHTML="Interest: ₹"+si;
}
</script>

</body>
</html>
