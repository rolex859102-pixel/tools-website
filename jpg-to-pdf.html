<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Convert JPG to PDF Online Free (Fast & Easy)</title>
<meta name="description" content="Convert JPG images to PDF online free. Merge multiple images into a single PDF quickly and easily.">

<style>
body {
    background:#020617;
    color:white;
    font-family:Arial;
    text-align:center;
    margin:0;
}

.container { padding:40px; }

input, button {
    padding:12px;
    margin:10px;
    border-radius:10px;
    border:none;
}

button {
    background:#ff4d4d;
    color:white;
    cursor:pointer;
}

.tool-btn {
    display:inline-block;
    margin:8px;
    padding:10px 18px;
    background:#1e293b;
    color:white;
    text-decoration:none;
    border-radius:10px;
    font-size:14px;
    transition:0.3s;
}

.tool-btn:hover {
    background:#ff4d4d;
}
</style>

</head>

<body>

<div class="container">

<h1>Convert JPG to PDF</h1>
<p><strong>Merge multiple JPG images into one PDF instantly.</strong></p>
<p><strong>100% Free • No Signup • Instant Download</strong></p>
    
<input type="file" id="upload" multiple accept="image/jpeg"><br>
<button onclick="createPDF()">Convert to PDF</button>

<div id="result"></div>

<h3 style="margin-top:40px;">🔥 Related Tools</h3>

<div style="margin-top:20px;">
<a href="pdf-to-word.html" class="tool-btn">PDF to Word</a>
<a href="pdf-to-jpg.html" class="tool-btn">PDF to JPG</a>
<a href="compress-pdf-100kb.html" class="tool-btn">Compress PDF</a>
</div>

</div>

<!-- jsPDF CDN -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<script>
async function createPDF() {
    const { jsPDF } = window.jspdf;
    let files = document.getElementById("upload").files;

    if (files.length === 0) return alert("Upload JPG images!");

    let pdf = new jsPDF();

    for (let i = 0; i < files.length; i++) {
        let file = files[i];
        let reader = new FileReader();

        await new Promise(resolve => {
            reader.onload = function(e) {
                let img = new Image();
                img.src = e.target.result;

                img.onload = function() {
                    if (i > 0) pdf.addPage();
                    pdf.addImage(img, 'JPEG', 10, 10, 180, 160);
                    resolve();
                };
            };
            reader.readAsDataURL(file);
        });
    }

    pdf.save("converted.pdf");
}
</script>
