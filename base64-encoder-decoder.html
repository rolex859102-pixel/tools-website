<!DOCTYPE html>
<html>
<head>
<title>Base64 Encoder Decoder</title>

<style>

body{
font-family:Arial;
text-align:center;
background:#f4f4f4;
}

.container{
width:75%;
margin:auto;
margin-top:40px;
}

textarea{
width:100%;
height:150px;
padding:10px;
font-size:16px;
}

button{
padding:10px 20px;
margin:10px;
background:#673ab7;
color:white;
border:none;
cursor:pointer;
}

#result{
margin-top:20px;
background:white;
padding:15px;
font-size:18px;
word-wrap:break-word;
}

</style>

<link rel="stylesheet" href="css/style.css">
</head>

<body>

<div class="container">

<h1>Base64 Encoder / Decoder</h1>

<textarea id="inputText" placeholder="Enter text or Base64"></textarea>

<br>

<button onclick="encodeBase64()">Encode</button>
<button onclick="decodeBase64()">Decode</button>

<div id="result"></div>

</div>

<script>

function encodeBase64(){

let text=document.getElementById("inputText").value;

let encoded=btoa(text);

document.getElementById("result").innerText=encoded;

/* auto input change */
document.getElementById("inputText").value=encoded;

}

function decodeBase64(){

let text=document.getElementById("inputText").value;

try{

let decoded=atob(text);

document.getElementById("result").innerText=decoded;

/* auto input change */

document.getElementById("inputText").value=decoded;

}

catch{

document.getElementById("result").innerText="Invalid Base64";

}

}

</script>

</body>
</html>
