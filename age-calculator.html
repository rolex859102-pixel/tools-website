<!DOCTYPE html>
<html>
<head>
<title>Age Calculator</title>

<style>

body{
font-family:Arial;
text-align:center;
background:#f4f4f4;
}

.container{
width:70%;
margin:auto;
margin-top:50px;
}

input{
padding:10px;
font-size:16px;
margin-top:10px;
}

button{
padding:10px 20px;
background:#4CAF50;
color:white;
border:none;
margin-top:15px;
cursor:pointer;
}

#result{
margin-top:20px;
background:white;
padding:15px;
font-size:20px;
font-weight:bold;
}

</style>

<link rel="stylesheet" href="css/style.css">
</head>

<body>

<div class="container">

<h1>Age Calculator</h1>

<p>Select your Date of Birth</p>

<input type="date" id="dob">

<br>

<button onclick="calculateAge()">Calculate Age</button>

<div id="result"></div>

</div>

<script>

function calculateAge(){

let dob=document.getElementById("dob").value;

if(!dob){
document.getElementById("result").innerText="Please select date of birth";
return;
}

let birthDate=new Date(dob);
let today=new Date();

let age=today.getFullYear()-birthDate.getFullYear();

let m=today.getMonth()-birthDate.getMonth();

if(m<0 || (m===0 && today.getDate()<birthDate.getDate())){
age--;
}

document.getElementById("result").innerText="Your Age: "+age+" Years";

}

</script>

</body>
</html>
