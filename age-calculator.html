<body>

<div class="container">

<h1>Age Calculator</h1>
<p><strong>Calculate your exact age in years, months and days.</strong></p>
<p><strong>100% Free • No Signup • Instant Download</strong></p>
<input type="date" id="dob"><br>

<button onclick="calculateAge()">Calculate Age</button>

<!-- SEO -->
<div style="max-width:800px;margin:40px auto;text-align:left;color:#cbd5f5;">
<h2>Free Age Calculator</h2>
<p>Find your exact age instantly using this tool.</p>
</div>

</div>

<script>
function calculateAge() {
    let dob = document.getElementById("dob").value;

    if (!dob) {
        alert("Select your date of birth!");
        return;
    }

    let birthDate = new Date(dob);
    let today = new Date();

    let years = today.getFullYear() - birthDate.getFullYear();
    let months = today.getMonth() - birthDate.getMonth();
    let days = today.getDate() - birthDate.getDate();

    if (days < 0) {
        months--;
        days += 30;
    }

    if (months < 0) {
        years--;
        months += 12;
    }

    document.getElementById("result").innerText =
        `You are ${years} years, ${months} months, and ${days} days old.`;
}
</script>
