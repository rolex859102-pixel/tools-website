<!DOCTYPE html>
<html>
<head>
<title>Age Calculator - Calculate Your Age Online</title>
<meta name="description" content="Free age calculator to find your exact age in years, months, and days instantly.">

<style>
body {background:#020617;color:white;text-align:center;font-family:Arial;}
input,button {padding:10px;margin:10px;border-radius:8px;border:none;}
button {background:#22c55e;color:white;}
</style>
</head>

<body>

<h1>Age Calculator</h1>

<input type="date" id="dob">
<br>
<button onclick="calculateAge()">Calculate Age</button>

<h2 id="result"></h2>

<script>
function calculateAge() {
    let dob = new Date(document.getElementById("dob").value);
    let today = new Date();

    let age = today.getFullYear() - dob.getFullYear();
    let m = today.getMonth() - dob.getMonth();

    if (m < 0 || (m === 0 && today.getDate() < dob.getDate())) {
        age--;
    }

    document.getElementById("result").innerText = "Your Age: " + age + " years";
}
</script>

</body>
</html>
