<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Baby Name Generator (Unlimited & Unique)</title>

<style>
body{
background:#020617;
color:white;
font-family:Arial;
text-align:center;
margin:0;
}

.container{
max-width:520px;
margin:auto;
padding:30px 15px;
}

input,select,button{
width:100%;
max-width:360px;
padding:12px;
margin:10px auto;
border-radius:10px;
border:none;
display:block;
}

button{
background:#f59e0b;
color:white;
cursor:pointer;
}

.name-item{
background:#1e293b;
padding:10px;
margin:6px 0;
border-radius:6px;
text-align:left;
cursor:pointer;
}

.name-item:hover{
background:#f59e0b;
}
</style>

</head>

<body>

<div class="container">

<h1>👶 Baby Name Generator</h1>
<p><strong>Boy • Girl • Indian • English • Unlimited</strong></p>

<input type="number" id="count" value="50" min="1" max="1000">

<select id="gender">
<option value="boy">Boy</option>
<option value="girl">Girl</option>
<option value="both">Both</option>
</select>

<select id="type">
<option value="indian">Indian</option>
<option value="english">English</option>
<option value="mixed">Mixed</option>
</select>

<label>
<input type="checkbox" id="unique" checked> No Repeat
</label>

<button onclick="generate()">Generate Names</button>

<div id="result"></div>

</div>

<script>

// 🔥 INDIAN BOY
const indianBoy = ["Aarav","Vivaan","Aditya","Arjun","Kabir","Rohan","Aryan","Krishna","Shivam","Aman"];

// 🔥 INDIAN GIRL
const indianGirl = ["Aaradhya","Ananya","Aditi","Anushka","Pooja","Priya","Riya","Sneha","Simran","Neha"];

// 🔥 ENGLISH BOY
const englishBoy = ["James","John","Michael","David","Robert","Daniel","Matthew"];

// 🔥 ENGLISH GIRL
const englishGirl = ["Emily","Sophia","Olivia","Emma","Ava","Isabella","Mia"];

// 🔥 LAST NAMES (REAL)
const indianLast = ["Sharma","Verma","Gupta","Yadav","Patel","Singh","Khan"];
const englishLast = ["Smith","Johnson","Brown","Taylor","Anderson","White"];

function random(arr){
return arr[Math.floor(Math.random()*arr.length)];
}

function generate(){

let count = parseInt(document.getElementById("count").value);
let gender = document.getElementById("gender").value;
let type = document.getElementById("type").value;
let unique = document.getElementById("unique").checked;

let result = document.getElementById("result");
result.innerHTML = "";

let used = new Set();

for(let i=0;i<count;i++){

let first, last, name;

// 🔥 GENDER LOGIC
if(gender === "boy"){
first = type === "english" ? random(englishBoy) : random(indianBoy);
}
else if(gender === "girl"){
first = type === "english" ? random(englishGirl) : random(indianGirl);
}
else{
let allFirst = [...indianBoy, ...indianGirl, ...englishBoy, ...englishGirl];
first = random(allFirst);
}

// 🔥 TYPE LOGIC (NO WEIRD MIX)
if(type === "indian"){
last = random(indianLast);
}
else if(type === "english"){
last = random(englishLast);
}
else{
if(Math.random() > 0.5){
last = random(indianLast);
}else{
last = random(englishLast);
}
}

name = first + " " + last;

// 🔥 NO REPEAT
if(unique){
let attempts = 0;
while(used.has(name) && attempts < 50){
first = random([...indianBoy, ...indianGirl]);
last = random(indianLast);
name = first + " " + last;
attempts++;
}
used.add(name);
}

result.innerHTML += `<div class="name-item" onclick="copyText('${name}')">${i+1}. ${name}</div>`;
}

}

// 🔥 COPY
function copyText(text){
navigator.clipboard.writeText(text);
alert("Copied: " + text);
}

</script>

</body>
</html>
