<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Baby Name Generator (Indian)</title>

<style>
body{
background:#020617;
color:white;
font-family:Arial;
text-align:center;
margin:0;
}

.container{
max-width:500px;
margin:auto;
padding:30px 15px;
}

input,select,button{
width:100%;
max-width:350px;
padding:12px;
margin:10px auto;
border-radius:10px;
border:none;
display:block;
}

button{
background:#f59e0b;
color:white;
cursor:pointer;
}

.name-item{
background:#1e293b;
padding:8px;
margin:5px 0;
border-radius:6px;
text-align:left;
}
</style>
</head>

<body>

<div class="container">

<h1>👶 Baby Name Generator</h1>
<p><strong>100% Real Indian Names • Male + Female</strong></p>

<input type="number" id="count" value="20" min="1" max="300">

<select id="gender">
<option value="all">All</option>
<option value="male">Boy Names</option>
<option value="female">Girl Names</option>
</select>

<label>
<input type="checkbox" id="unique" checked> No Repeat
</label>

<button onclick="generate()">Generate Names</button>

<div id="result"></div>

</div>

<script>

// 🔥 MALE NAMES (short list reuse)
const male = [
"Aarav","Vivaan","Aditya","Arjun","Kabir","Rohan","Kunal","Rahul","Krishna","Shivam",
"Aman","Nikhil","Yash","Aryan","Ravi","Vikas","Raj","Amit","Akash","Karan"
];

// 🔥 FEMALE NAMES
const female = [
"Aaradhya","Ananya","Aditi","Anushka","Pooja","Priya","Riya","Sneha","Simran","Neha",
"Kavita","Shreya","Shivani","Swati","Tanisha","Trisha","Isha","Kajal","Radhika","Sonia"
];

function generate(){

let count = parseInt(document.getElementById("count").value);
let gender = document.getElementById("gender").value;
let unique = document.getElementById("unique").checked;

let pool = [];

if(gender === "male"){
pool = male;
}else if(gender === "female"){
pool = female;
}else{
pool = male.concat(female);
}

let result = document.getElementById("result");
result.innerHTML = "";

// limit
if(unique && count > pool.length){
alert("Only " + pool.length + " unique names available");
count = pool.length;
}

let used = new Set();

for(let i=0; i<count; i++){

let name;

if(unique){
do{
name = pool[Math.floor(Math.random()*pool.length)];
} while(used.has(name));
used.add(name);
}else{
name = pool[Math.floor(Math.random()*pool.length)];
}

result.innerHTML += `<div class="name-item">${i+1}. ${name}</div>`;
}

}

</script>

</body>
</html>
