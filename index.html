<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Free Online Tools - Image, PDF, Calculator</title>
<meta name="description" content="Free online tools for image compression, PDF, calculators and more.">

<style>
body{
background:#020617;
color:white;
font-family:Arial;
margin:0;
}

/* NAVBAR */
nav{
background:#020617;
padding:12px 20px;
border-bottom:1px solid #1e293b;
display:flex;
justify-content:space-between;
align-items:center;
flex-wrap:wrap;
}

.logo{
font-size:20px;
font-weight:bold;
color:#22c55e;
}

.menu{
display:flex;
gap:15px;
}

.menu a{
color:white;
text-decoration:none;
font-size:14px;
padding:6px 8px;
border-radius:5px;
}

.menu a:hover{
background:#1e293b;
color:#22c55e;
}

/* SEARCH */
.search-box{
text-align:center;
margin:30px 15px;
}

.search-box input{
width:90%;
max-width:400px;
padding:12px;
border-radius:10px;
border:none;
font-size:14px;
}

/* TOOLS GRID */
.tools{
display:grid;
grid-template-columns:repeat(auto-fit, minmax(200px,1fr));
gap:15px;
padding:20px;
}

.card{
background:#1e293b;
padding:20px;
border-radius:10px;
text-align:center;
transition:0.3s;
}

.card:hover{
transform:translateY(-5px);
background:#334155;
}

.card a{
color:white;
text-decoration:none;
font-size:15px;
}

/* NO RESULT */
#noResult{
display:none;
text-align:center;
margin:20px;
color:#94a3b8;
}

/* FOOTER */
footer{
text-align:center;
padding:20px;
border-top:1px solid #1e293b;
margin-top:30px;
}

footer a{
color:white;
text-decoration:none;
margin:0 10px;
}

footer a:hover{
color:#60a5fa;
}

/* MOBILE */
@media(max-width:600px){
.menu{
width:100%;
justify-content:center;
margin-top:10px;
flex-wrap:wrap;
}
}
</style>
</head>

<body>

<!-- NAVBAR -->
<nav>
<div class="logo">⚡ ToolsHub</div>
<div class="menu">
<a href="index.html">Home</a>
<a href="image-resizer.html">Image</a>
<a href="compress-image-to-50kb.html">Compress</a>
<a href="percentage-calculator.html">Calculator</a>
<a href="contact.html">Contact</a>
</div>
</nav>

<!-- SEARCH -->
<div class="search-box">
<input type="text" id="search" placeholder="Search tools...">
</div>

<!-- TOOLS -->
<div class="tools" id="tools">

<div class="card" data-name="compress image 20kb">
<a href="compress-image-to-20kb.html">Compress Image 20KB</a>
</div>

<div class="card" data-name="compress image 50kb">
<a href="compress-image-to-50kb.html">Compress Image 50KB</a>
</div>

<div class="card" data-name="compress image 100kb">
<a href="compress-image-to-100kb.html">Compress Image 100KB</a>
</div>

<div class="card" data-name="image resizer">
<a href="image-resizer.html">Image Resizer</a>
</div>

<div class="card" data-name="percentage calculator">
<a href="percentage-calculator.html">Percentage Calculator</a>
</div>

<div class="card" data-name="age calculator">
<a href="age-calculator.html">Age Calculator</a>
</div>

<div class="card" data-name="qr code generator">
<a href="qr-code-generator.html">QR Code Generator</a>
</div>

<div class="card" data-name="password generator">
<a href="password-generator.html">Password Generator</a>
</div>

<div class="card" data-name="word counter">
<a href="word-counter.html">Word Counter</a>
</div>

<div class="card" data-name="text to speech">
<a href="text-to-speech.html">Text to Speech</a>
</div>

</div>

<p id="noResult">No tools found 😢</p>

<!-- FOOTER -->
<footer>
<a href="about.html">About</a> |
<a href="contact.html">Contact</a> |
<a href="privacy-policy.html">Privacy Policy</a> |
<a href="disclaimer.html">Disclaimer</a>
</footer>

<!-- SEARCH SCRIPT -->
<script>
let search = document.getElementById("search");
let cards = document.querySelectorAll(".card");
let noResult = document.getElementById("noResult");

search.addEventListener("keyup", function(){

let value = search.value.toLowerCase();
let visible = 0;

cards.forEach(function(card){

let text = card.getAttribute("data-name");

if(text.includes(value)){
card.style.display = "block";
visible++;

// highlight
let original = card.querySelector("a").innerText;
let regex = new RegExp(`(${value})`, "gi");
card.querySelector("a").innerHTML =
original.replace(regex, "<span style='color:#22c55e'>$1</span>");

}else{
card.style.display = "none";
}

});

noResult.style.display = visible === 0 ? "block" : "none";

});
</script>

</body>
</html>
