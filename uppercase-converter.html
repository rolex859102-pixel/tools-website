<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Uppercase Converter Tool</title>

<style>
body {
    background:#020617;
    color:white;
    font-family:Arial;
    margin:0;
    text-align:center;
}

header {
    padding:20px;
    background:#0f172a;
}

textarea {
    width:80%;
    height:150px;
    padding:15px;
    border-radius:10px;
    border:none;
    margin-top:20px;
}

button {
    margin-top:15px;
    padding:10px 20px;
    border:none;
    border-radius:8px;
    background:#22c55e;
    color:white;
}

.result {
    margin-top:20px;
    font-size:18px;
}
</style>

</head>

<body>

<header>
<h1>🔠 Uppercase Converter</h1>
<p>Convert text to uppercase instantly</p>
</header>

<textarea id="text" placeholder="Enter text..."></textarea><br>

<button onclick="convert()">Convert</button>

<div class="result" id="result"></div>

<script>
function convert(){
let text=document.getElementById("text").value;
document.getElementById("result").innerText=text.toUpperCase();
}
</script>

</body>
</html>
