<!DOCTYPE html>
<html>
<head>
<title>Text to Speech</title>

<style>
body{background:#020617;color:white;text-align:center;font-family:Arial;}
textarea{width:80%;height:120px;margin:20px;border-radius:10px;border:none;}
button{padding:10px;background:#22c55e;border:none;color:white;border-radius:8px;}
</style>

</head>

<body>

<h1>🔊 Text to Speech</h1>

<textarea id="text" placeholder="Enter text..."></textarea>

<br>

<button onclick="speak()">Speak</button>

<script>
function speak(){
let text=document.getElementById("text").value;
let speech=new SpeechSynthesisUtterance(text);
speechSynthesis.speak(speech);
}
</script>

</body>
</html>
