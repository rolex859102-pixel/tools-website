<!DOCTYPE html>
<html>
<head>
<title>Text to Speech Online Free</title>

<style>
body {background:#020617;color:white;text-align:center;font-family:Arial;}
.container {padding:40px;}
textarea {width:60%;height:120px;padding:10px;border-radius:10px;background:#1e293b;color:white;}
button {padding:12px;margin:10px;border-radius:10px;border:none;background:#ff4d4d;color:white;}
</style>
</head>

<body>

<div class="container">
<h1>Text to Speech</h1>
<p><strong>Convert text into voice instantly.</strong></p>

<textarea id="text"></textarea><br>
<button onclick="speak()">Speak</button>
</div>

<script>
function speak(){
let text=document.getElementById("text").value;
let speech=new SpeechSynthesisUtterance(text);
speech.lang="en-US";
speechSynthesis.speak(speech);
}
</script>

</body>
</html>
