<!DOCTYPE html>
<html>
<head>
<title>Text to Speech</title>

<style>

body{
font-family:Arial;
text-align:center;
background:#f4f4f4;
}

.container{
width:75%;
margin:auto;
margin-top:40px;
}

textarea{
width:100%;
height:150px;
padding:10px;
font-size:16px;
}

button{
padding:10px 20px;
margin:10px;
background:#009688;
color:white;
border:none;
cursor:pointer;
}

</style>

<link rel="stylesheet" href="css/style.css">
</head>

<body>

<div class="container">

<h1>Text to Speech</h1>

<textarea id="text" placeholder="Enter text"></textarea>

<br>

<button onclick="speakText()">Speak</button>
<button onclick="stopText()">Stop</button>

</div>

<script>

let speech;

function speakText(){

let text=document.getElementById("text").value;

speech=new SpeechSynthesisUtterance(text);

speech.lang="en-US";

window.speechSynthesis.speak(speech);

}

function stopText(){

window.speechSynthesis.cancel();

}

</script>

</body>
</html>
